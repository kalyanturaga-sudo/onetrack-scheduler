<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signing in…</title>
<style>
  body {
    font-family: 'DM Sans', sans-serif;
    background: #1e1c18; color: #f0ece6;
    display: flex; align-items: center; justify-content: center;
    height: 100vh; margin: 0; text-align: center;
  }
</style>
</head>
<body>
  <div id="msg">☁️ Signing in with Google…</div>
  <script>
    /* ============================================================
       oauth-callback.html — Google OAuth 2.0 implicit flow

       Google sends the result back in the URL *FRAGMENT*, not the
       query string:

         .../oauth-callback.html#access_token=ya29...&expires_in=3599&state=...

       The fragment never leaves the browser (it is not sent to the
       web server), which is why this works on a static GitHub Pages
       host with no backend and no client secret. There is no code to
       exchange, so the old /api/github-auth Vercel call is gone.
       ============================================================ */
    (function () {

      // Errors can arrive in either place depending on how far Google got.
      const hash  = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      const query = new URLSearchParams(window.location.search);

      const accessToken = hash.get('access_token');
      const expiresIn   = hash.get('expires_in');      // seconds, ~3599
      const returnedState = hash.get('state') || query.get('state');
      const error = hash.get('error') || query.get('error');

      const expectedState = sessionStorage.getItem('OT_OAUTH_STATE');
      sessionStorage.removeItem('OT_OAUTH_STATE');

      if (error) {
        fail(error);
      } else if (!accessToken) {
        fail('No access token returned');
      } else if (!expectedState || returnedState !== expectedState) {
        // Someone else initiated this redirect — do not trust the token.
        fail('State mismatch — sign-in was not started from this app');
      } else {
        /* v5.7: localStorage, NOT sessionStorage. sessionStorage dies
           with the tab, which forced a fresh sign-in on every browser
           restart or new tab even while the token was still valid. */
        localStorage.setItem('OT_ACCESS_TOKEN', accessToken);
        localStorage.setItem(
          'OT_TOKEN_EXPIRES',
          // Shave 60s off so we never hand storage.js a token that
          // expires mid-request.
          String(Date.now() + ((parseInt(expiresIn, 10) || 3600) - 60) * 1000)
        );
        // Strip the token out of the address bar / history before moving on.
        history.replaceState(null, '', window.location.pathname);
        redirectHome();
      }

      function fail(reason) {
        sessionStorage.setItem('OT_OAUTH_ERROR', reason);
        document.getElementById('msg').textContent = '⚠️ Sign-in failed: ' + reason;
        redirectHome();
      }

      function redirectHome() {
        const returnPath = sessionStorage.getItem('OT_RETURN_PATH') || './';
        setTimeout(function () {
          window.location.replace(returnPath);
        }, 1000);
      }
    })();
  </script>
</body>
</html>
