const MODE_KEY = "ONETRACK_ROUTINES_MODE";
const MODES = ["daily","weekend","weekly","fortnightly","monthly"];
let activeMode = "daily";

const MODE_META = {
  daily:       { label:"☀️ Daily",        progress:"✦ Daily progress",       title:"🔁 Routines" },
  weekend:     { label:"🌤 Weekend",       progress:"✦ Weekend progress",     title:"🌤 Weekend" },
  weekly:      { label:"📅 Weekly",        progress:"✦ Weekly progress",      title:"📅 Weekly" },
  fortnightly: { label:"🗓 Fortnightly",   progress:"✦ Fortnightly progress", title:"🗓 Fortnightly" },
  monthly:     { label:"📆 Monthly",       progress:"✦ Monthly progress",     title:"📆 Monthly" },
};

function setMode(mode){
  activeMode = mode;
  _cset(MODE_KEY, mode);
  // Update tab bar
  document.querySelectorAll(".mode-tab").forEach(t=>t.classList.toggle("active", t.dataset.mode===mode));
  // Update header
  document.getElementById("pageTitle").textContent = MODE_META[mode].title;
  document.getElementById("progressLabel").textContent = MODE_META[mode].progress;
  // Show/hide bodies
  document.getElementById("bodyDaily").style.display  = mode==="daily"   ? "" : "none";
  document.getElementById("bodyWeekly").style.display = mode==="weekly"  ? "" : "none";
  document.getElementById("bodySimple").style.display = (mode!=="daily"&&mode!=="weekly") ? "" : "none";
  // Print button
  document.getElementById("btnPrint").style.display    = mode!=="weekly"  ? "" : "none";
  document.getElementById("btnWkPrint").style.display  = mode==="weekly"  ? "" : "none";
  // Sidebar label
  document.getElementById("simpleSidebarLabel").textContent = MODE_META[mode].label.replace(/^[^ ]+ /,"");
  // Render
  if(mode==="daily"){ render(); } else if(mode==="weekly"){ renderWeekly(); } else { renderSimple(mode); }
}

document.querySelectorAll(".mode-tab").forEach(t=>{
  t.addEventListener("click", ()=>setMode(t.dataset.mode));
});

document.getElementById("btnWkPrint").onclick=()=>{ if(typeof window._openWkPrintModal==="function") window._openWkPrintModal(); };

document.getElementById("btnResetAll").addEventListener("click", ()=>{
  if(activeMode==="daily"){
    if(!confirm("Reset all routines? This unchecks everything (edits and custom routines are kept).")) return;
    const d=loadData()||{};
    Object.keys(d).forEach(id=>{ if(d[id]&&d[id].items) d[id].items.forEach(it=>{ if(!it.isHeader) it.done=false; }); });
    saveData(d); render(); showToast("↺ All routines reset");
  } else if(activeMode==="weekly"){
    if(!confirm("Uncheck all tasks for the week?")) return;
    const d=loadWkData()||{days:[]};
    (d.days||[]).forEach(day=>{ (day.items||[]).forEach(it=>it.done=false); });
    saveWkData(d);
    const active=getWkActive(); if(active) renderWeeklyCard(active);
    renderWeeklySidebar(); updateWkProgress(); showToast("↺ Week reset");
  } else {
    if(!confirm("Reset all tasks in this view? This unchecks everything.")) return;
    const d=loadSimpleData(activeMode);
    Object.keys(d).forEach(id=>{ if(d[id]&&d[id].items) d[id].items.forEach(it=>it.done=false); });
    saveSimpleData(activeMode,d); renderSimple(activeMode); showToast("↺ Reset");
  }
});

function loadSimpleOrder(mode){ try{ const v=_cget(_smKey(mode,"ORDER_V1")); return v?JSON.parse(v):null; }catch(e){ return null; } }

function getAllSimpleSections(mode){
  let saved = loadSimpleSections(mode);
  if(!saved){
    const defs = (SIMPLE_DEFAULTS[mode]||[]).map(s=>({id:s.id,icon:s.icon,label:s.label,cls:s.cls}));
    saveSimpleSections(mode, defs);
    const d={};
    (SIMPLE_DEFAULTS[mode]||[]).forEach(s=>{ d[s.id]={items:s.items.map(t=>({text:t,done:false}))}; });
    saveSimpleData(mode, d);
    saved=defs;
  }
  const order=loadSimpleOrder(mode);
  if(!order) return saved;
  const ordered=[];
  order.forEach(id=>{ const s=saved.find(x=>x.id===id); if(s)ordered.push(s); });
  saved.forEach(s=>{ if(!ordered.find(x=>x.id===s.id))ordered.push(s); });
  return ordered;
}

/* ── Warn modal helper ── */
function showWarnModal(title,msg,onConfirm){
  const modal=document.getElementById("deleteWarnModal");
  document.getElementById("deleteWarnTitle").textContent=title;
  document.getElementById("deleteWarnMsg").textContent=msg;
  modal.classList.add("open");
  const cb=document.getElementById("deleteWarnConfirm");
  const cc=document.getElementById("deleteWarnCancel");
  const nb=cb.cloneNode(true); const nc=cc.cloneNode(true);
  cb.parentNode.replaceChild(nb,cb); cc.parentNode.replaceChild(nc,cc);
  nb.onclick=()=>{ modal.classList.remove("open"); onConfirm(); };
  nc.onclick=()=>modal.classList.remove("open");
  modal.onclick=e=>{ if(e.target===modal) modal.classList.remove("open"); };
}

/* ── Update progress for simple modes ── */
function updateSimpleProgress(mode){
  const d=loadSimpleData(mode);
  const secs=getAllSimpleSections(mode);
  let total=0,done=0;
  secs.forEach(s=>{ const items=(d[s.id]&&d[s.id].items)||[]; total+=items.length; done+=items.filter(it=>it.done).length; });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById("overallFill").style.width=pct+"%";
  document.getElementById("overallPct").textContent=pct+"%";
  document.getElementById("footerStats").textContent=done+" of "+total+" tasks done";
  if(pct===100&&total>0){ fireConfetti(); showToast("🎉 All done!"); }
}

let _simpleTabDragSrc=null;

function renderSimpleSidebar(mode){
  const sidebar=document.getElementById("rSidebarSimple");
  const addBtn=document.getElementById("btnAddSimpleSection");
  sidebar.querySelectorAll(".r-stab").forEach(el=>el.remove());

  const secs=getAllSimpleSections(mode);
  const d=loadSimpleData(mode);
  if(!_simpleActiveId[mode]||!secs.find(s=>s.id===_simpleActiveId[mode])){
    _simpleActiveId[mode]=secs[0]?.id||null;
  }

  // Apply collapse state
  const collapsed=loadSimpleCollapsed(mode);
  sidebar.classList.toggle("collapsed",collapsed);
  const toggleBtn=document.getElementById("btnSidebarToggleSimple");
  if(toggleBtn){ toggleBtn.textContent=collapsed?"▶":"◀"; }

  secs.forEach(sec=>{
    const items=(d[sec.id]&&d[sec.id].items)||[];
    const total=items.length, done=items.filter(it=>it.done).length;
    const isActive=sec.id===_simpleActiveId[mode];
    const isListDone=total>0&&done===total;

    const tab=document.createElement("div");
    tab.className="r-stab"+(isActive?" active":"")+(isListDone?" list-done":"");
    tab.dataset.id=sec.id;

    const grip=document.createElement("span"); grip.className="r-stab-grip"; grip.textContent="⠿";
    const icon=document.createElement("span"); icon.className="r-stab-icon"; icon.textContent=sec.icon;
    const lbl=document.createElement("input"); lbl.type="text"; lbl.className="r-stab-label"; lbl.value=sec.label; lbl.readOnly=true;
    const editHint=document.createElement("span"); editHint.className="r-stab-edit-hint"; editHint.textContent="✎"; editHint.title="Rename";
    const cnt=document.createElement("span"); cnt.className="r-stab-count"; cnt.textContent=total?(done+"/"+total):"0";

    const del=document.createElement("button"); del.className="r-stab-del"; del.title="Delete section"; del.textContent="✕";
    del.onclick=e=>{
      e.stopPropagation();
      showWarnModal("Delete Section?",`"${sec.label}" and all its tasks will be permanently removed. This cannot be undone.`,()=>{
        const sArr=loadSimpleSections(mode)||[];
        const idx=sArr.findIndex(x=>x.id===sec.id); if(idx>-1) sArr.splice(idx,1);
        saveSimpleSections(mode,sArr);
        const d2=loadSimpleData(mode); delete d2[sec.id]; saveSimpleData(mode,d2);
        const remaining=getAllSimpleSections(mode).filter(x=>x.id!==sec.id);
        _simpleActiveId[mode]=remaining[0]?.id||null;
        renderSimple(mode); showToast("Section deleted");
      });
    };

    tab.appendChild(grip); tab.appendChild(icon); tab.appendChild(lbl); tab.appendChild(editHint); tab.appendChild(cnt); tab.appendChild(del);

    editHint.addEventListener("click",e=>{ e.stopPropagation(); lbl.readOnly=false; lbl.focus(); lbl.select(); });
    tab.addEventListener("click",e=>{
      if(e.target===grip||e.target===del) return;
      if(isActive&&e.target===lbl){ lbl.readOnly=false; lbl.focus(); lbl.select(); return; }
      _simpleActiveId[mode]=sec.id; saveSimpleActive(mode,sec.id); renderSimple(mode);
    });
    lbl.addEventListener("dblclick",e=>{ lbl.readOnly=false; lbl.focus(); lbl.select(); e.stopPropagation(); });
    lbl.addEventListener("blur",()=>{
      lbl.readOnly=true;
      const v=lbl.value.trim(); if(!v){ lbl.value=sec.label; return; }
      const sArr=loadSimpleSections(mode)||[]; const idx=sArr.findIndex(x=>x.id===sec.id);
      if(idx>-1){ sArr[idx].label=v; saveSimpleSections(mode,sArr); }
      renderSimple(mode);
    });
    lbl.addEventListener("keydown",e=>{ if(e.key==="Enter") lbl.blur(); if(e.key==="Escape"){ lbl.value=sec.label; lbl.blur(); } e.stopPropagation(); });

    // Drag reorder
    grip.addEventListener("pointerdown",()=>tab.draggable=true);
    grip.addEventListener("pointerup",()=>tab.draggable=false);
    grip.addEventListener("mouseleave",()=>tab.draggable=false);
    tab.addEventListener("dragstart",e=>{
      if(!tab.draggable){e.preventDefault();return;}
      _simpleTabDragSrc=sec.id; tab.classList.add("r-tab-dragging");
      e.dataTransfer.effectAllowed="move"; e.dataTransfer.setData("text/plain",sec.id);
    });
    tab.addEventListener("dragend",()=>{
      tab.classList.remove("r-tab-dragging"); tab.draggable=false; _simpleTabDragSrc=null;
      sidebar.querySelectorAll(".r-stab").forEach(t=>t.classList.remove("r-tab-drop-above","r-tab-drop-below"));
    });
    tab.addEventListener("dragover",e=>{
      if(!_simpleTabDragSrc||_simpleTabDragSrc===sec.id) return;
      e.preventDefault();
      const mid=tab.getBoundingClientRect().top+tab.getBoundingClientRect().height/2;
      sidebar.querySelectorAll(".r-stab").forEach(t=>t.classList.remove("r-tab-drop-above","r-tab-drop-below"));
      tab.classList.add(e.clientY<mid?"r-tab-drop-above":"r-tab-drop-below");
    });
    tab.addEventListener("dragleave",()=>tab.classList.remove("r-tab-drop-above","r-tab-drop-below"));
    tab.addEventListener("drop",e=>{
      if(!_simpleTabDragSrc||_simpleTabDragSrc===sec.id) return;
      e.preventDefault(); tab.classList.remove("r-tab-drop-above","r-tab-drop-below");
      const before=e.clientY<tab.getBoundingClientRect().top+tab.getBoundingClientRect().height/2;
      const all2=getAllSimpleSections(mode), ids=all2.map(x=>x.id);
      const fi=ids.indexOf(_simpleTabDragSrc); const [moved]=ids.splice(fi,1);
      let ins=ids.indexOf(sec.id); if(!before) ins++;
      ids.splice(ins,0,moved); saveSimpleOrder(mode,ids); _simpleTabDragSrc=null; renderSimple(mode);
    });

    sidebar.insertBefore(tab,addBtn);
  });
}

let _simpleTaskDrag=null;

function renderSimpleContent(mode){
  const content=document.getElementById("rContentSimple");
  content.innerHTML="";
  const secs=getAllSimpleSections(mode);
  const sec=secs.find(s=>s.id===_simpleActiveId[mode]);
  if(!sec){
    content.innerHTML='<div class="r-empty"><div class="r-empty-icon">📋</div><div>No sections yet — create one using the button in the sidebar.</div></div>';
    return;
  }

  let d=loadSimpleData(mode);
  if(!d[sec.id]) d[sec.id]={items:[]};
  const items=d[sec.id].items;
  const undone=items.filter(it=>!it.done), doneItems=items.filter(it=>it.done);
  const sorted=[...undone,...doneItems];
  d[sec.id].items=sorted;
  const total=sorted.length, done=doneItems.length;
  const pct=total?Math.round(done/total*100):0;
  const isListDone=total>0&&done===total;

  const block=document.createElement("div");
  block.className="r-block "+sec.cls+(isListDone?" list-done":"");

  // Header
  const hdr=document.createElement("div"); hdr.className="r-block-header";
  const tw=document.createElement("div"); tw.className="r-block-title-wrap";
  const iconEl=document.createElement("span"); iconEl.className="r-block-icon"; iconEl.textContent=sec.icon;
  iconEl.title="Click to change icon"; iconEl.style.cursor="pointer";
  iconEl.onclick=()=>{
    const p=prompt("New emoji icon:",sec.icon);
    if(p&&p.trim()){
      const sArr=loadSimpleSections(mode)||[], idx=sArr.findIndex(x=>x.id===sec.id);
      if(idx>-1){ sArr[idx].icon=p.trim(); saveSimpleSections(mode,sArr); renderSimple(mode); }
    }
  };
  const td=document.createElement("div");
  const te=document.createElement("div"); te.className="r-block-title"; te.textContent=sec.label;
  const se=document.createElement("div"); se.className="r-block-subtitle";
  se.textContent=new Date().toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  td.appendChild(te); td.appendChild(se); tw.appendChild(iconEl); tw.appendChild(td);

  const ad=document.createElement("div"); ad.className="r-block-actions";
  if(isListDone){
    const b=document.createElement("span"); b.className="block-done-badge"; b.textContent="✓ All done"; ad.appendChild(b);
  } else {
    const ab=document.createElement("button"); ab.className="btn btn-ghost"; ab.style.cssText="font-size:11px;padding:3px 8px;"; ab.textContent="☐ All";
    ab.onclick=()=>{ const a=items.every(it=>it.done); items.forEach(it=>it.done=!a); d[sec.id].items=items; saveSimpleData(mode,d); renderSimple(mode); };
    const sd=document.createElement("div"); sd.style.cssText="font-size:11px;font-weight:600;color:var(--text3);background:var(--surface);border-radius:20px;padding:2px 8px;border:1px solid var(--border);";
    sd.textContent=done+"/"+total; ad.appendChild(ab); ad.appendChild(sd);
  }
  const ub=document.createElement("button"); ub.className="btn-uncheck-all"; ub.textContent="↺ Uncheck";
  ub.onclick=()=>{ items.forEach(it=>it.done=false); d[sec.id].items=items; saveSimpleData(mode,d); renderSimple(mode); };
  ad.appendChild(ub); hdr.appendChild(tw); hdr.appendChild(ad);

  const pb=document.createElement("div"); pb.className="r-block-progress";
  const pf=document.createElement("div"); pf.className="r-block-progress-fill"; pf.style.width=pct+"%";
  pb.appendChild(pf);

  const body=document.createElement("div"); body.className="r-block-body";
  const grid=document.createElement("div"); grid.className="r-task-grid";

  // Add task input
  const nt=document.createElement("div"); nt.className="r-block-add-task";
  nt.innerHTML=`<input placeholder="Add task… (Enter to save)">`;
  const ni=nt.querySelector("input");
  ni.addEventListener("keydown",e=>{
    if(e.key==="Enter"){
      const v=ni.value.trim(); if(!v) return;
      const d2=loadSimpleData(mode); if(!d2[sec.id]) d2[sec.id]={items:[]};
      d2[sec.id].items.unshift({text:v.charAt(0).toUpperCase()+v.slice(1),done:false});
      saveSimpleData(mode,d2); renderSimple(mode); showToast("✓ Task added");
    }
    e.stopPropagation();
  });
  grid.appendChild(nt);

  // Task rows
  function buildRow(item,idx){
    const row=document.createElement("div"); row.className="r-task"+(item.done?" completed":"");
    const handle=document.createElement("span"); handle.className="r-drag-handle"; handle.textContent="⠿";
    handle.onpointerdown=()=>row.draggable=true; handle.onpointerup=()=>row.draggable=false; handle.onmouseleave=()=>row.draggable=false;
    row.addEventListener("dragstart",e=>{ if(!row.draggable){e.preventDefault();return;} _simpleTaskDrag={mode,secId:sec.id,fromIndex:idx}; row.classList.add("r-dragging"); e.dataTransfer.effectAllowed="move"; e.dataTransfer.setData("text/plain",""); e.stopPropagation(); });
    row.addEventListener("dragend",()=>{ row.classList.remove("r-dragging"); row.draggable=false; setTimeout(()=>_simpleTaskDrag=null,50); document.querySelectorAll(".r-task.r-drag-over").forEach(r2=>r2.classList.remove("r-drag-over")); });
    row.addEventListener("dragover",e=>{ if(!_simpleTaskDrag||_simpleTaskDrag.secId!==sec.id) return; e.preventDefault(); document.querySelectorAll(".r-task.r-drag-over").forEach(r2=>r2.classList.remove("r-drag-over")); row.classList.add("r-drag-over"); });
    row.addEventListener("drop",e=>{ if(!_simpleTaskDrag||_simpleTaskDrag.secId!==sec.id) return; e.preventDefault(); document.querySelectorAll(".r-task.r-drag-over").forEach(r2=>r2.classList.remove("r-drag-over")); const from=_simpleTaskDrag.fromIndex; _simpleTaskDrag=null; if(from===idx) return; const d2=loadSimpleData(mode); const arr=d2[sec.id].items; const [mv]=arr.splice(from,1); arr.splice(from<idx?idx-1:idx,0,mv); saveSimpleData(mode,d2); renderSimple(mode); });

    const svgW=document.createElement("span"); svgW.className="task-cb-svg"+(item.done?" tcb-on":"");
    svgW.innerHTML='<svg width="18" height="18" viewBox="0 0 20 20" style="overflow:visible;"><rect class="tcb-box" x="2" y="2" width="16" height="16" rx="4"/><path class="tcb-tick" d="M5 10 L8.5 13.5 L22 3"/></svg>';
    svgW.addEventListener("click",e=>{ e.stopPropagation(); toggle(); });

    const textEl=document.createElement("span"); textEl.className="r-task-text"; textEl.textContent=item.text;
    if(item.done) textEl.style.cssText="text-decoration:line-through;opacity:0.42;";
    const editInp=document.createElement("input"); editInp.type="text"; editInp.className="r-task-edit"; editInp.value=item.text;

    const acts=document.createElement("div"); acts.className="r-task-actions";
    function commitEdit2(){
      const nt2=editInp.value.trim();
      if(nt2){ const d2=loadSimpleData(mode); d2[sec.id].items[idx].text=nt2; saveSimpleData(mode,d2); }
      renderSimple(mode);
    }
    editInp.addEventListener("keydown",e=>{ if(e.key==="Enter") commitEdit2(); if(e.key==="Escape") renderSimple(mode); });
    editInp.addEventListener("click",e=>e.stopPropagation());
    const delBtn=document.createElement("button"); delBtn.className="r-act-btn"; delBtn.title="Remove"; delBtn.innerHTML="✕"; delBtn.style.color="#e85c5c";
    delBtn.onclick=e=>{ e.stopPropagation(); const d2=loadSimpleData(mode); d2[sec.id].items.splice(idx,1); saveSimpleData(mode,d2); renderSimple(mode); };
    acts.appendChild(delBtn);

    row.appendChild(handle); row.appendChild(svgW); row.appendChild(textEl); row.appendChild(editInp); row.appendChild(acts);

    function toggle(){ const d2=loadSimpleData(mode); const arr=d2[sec.id].items; const li=arr.findIndex(it=>it.text===item.text&&it.done===item.done); if(li>-1) arr[li].done=!arr[li].done; saveSimpleData(mode,d2); renderSimple(mode); }
    textEl.addEventListener("click",e=>{
      e.stopPropagation();
      textEl.classList.add("editing"); editInp.classList.add("editing");
      editInp.focus(); editInp.select();
    });
    return row;
  }

  sorted.forEach((item,i)=>grid.appendChild(buildRow(item,i)));

  // Bottom row
  const btnRow=document.createElement("div"); btnRow.className="r-block-btn-row";
  const addSecBtn2=document.createElement("button"); addSecBtn2.className="r-carry-btn"; addSecBtn2.textContent="＋ Add Section";
  addSecBtn2.onclick=()=>{ if(typeof window._openNewSectionModal==="function") window._openNewSectionModal(); };

  "wk-sat":{ bg:"rgba(193,123,63,0.18)",  border:"rgba(193,123,63,0.55)"  },
  "wk-sun":{ bg:"rgba(193,123,63,0.22)",  border:"rgba(193,123,63,0.60)"  },
};

// Short label → full day name for card headers
const WK_FULL_DAY = {"Mon":"Monday","Tue":"Tuesday","Wed":"Wednesday","Thu":"Thursday","Fri":"Friday","Sat":"Saturday","Sun":"Sunday"};

// which JS day index maps to which day id
const WK_JS_DAY = {0:"wk-sun",1:"wk-mon",2:"wk-tue",3:"wk-wed",4:"wk-thu",5:"wk-fri",6:"wk-sat"};
const todayWkId = WK_JS_DAY[new Date().getDay()];

function loadWkData(){
  try{ const v=_cget(WK_KEY); return v?JSON.parse(v):null; }catch(e){ return null; }
}
function saveWkData(d){ _cset(WK_KEY, JSON.stringify(d)); }
function loadWkOrder(){
  try{ const v=_cget(WK_ORD_KEY); if(Array.isArray(v?JSON.parse(v):null)) return JSON.parse(v); }catch(e){}
  return null;
}
function saveWkOrder(ids){ _cset(WK_ORD_KEY, JSON.stringify(ids)); }
function getWkActive(){ return _cget(WK_ACT_KEY)||null; }
function setWkActive(id){ id?_cset(WK_ACT_KEY,id):_cget(WK_ACT_KEY)&&_cset(WK_ACT_KEY,""); }

// Full name → 3-letter abbreviation migration map
const WK_SHORTEN = {"Monday":"Mon","Tuesday":"Tue","Wednesday":"Wed","Thursday":"Thu","Friday":"Fri","Saturday":"Sat","Sunday":"Sun"};

function initWkData(){
  let d=loadWkData();
  if(!d){
    d={days:WK_DAY_DEFAULTS.map(x=>({...x,items:x.items.map(i=>({...i}))}))};
    saveWkData(d);
  } else {
    // Migrate any existing full day names to 3-letter abbreviations
    let changed=false;
    (d.days||[]).forEach(day=>{
      if(WK_SHORTEN[day.label]){ day.label=WK_SHORTEN[day.label]; changed=true; }
    });
    if(changed) saveWkData(d);
  }
  return d;
}

function getOrderedWkDays(){
  const d=loadWkData()||{days:[]};
  const days=d.days||[];
  const orderRaw=_cget(WK_ORD_KEY);
  if(!orderRaw) return days;
  try{
    const order=JSON.parse(orderRaw);
    const ordered=[];
    order.forEach(id=>{ const day=days.find(x=>x.id===id); if(day) ordered.push(day); });
    days.forEach(day=>{ if(!ordered.find(x=>x.id===day.id)) ordered.push(day); });
    return ordered;
  }catch(e){ return days; }
}

let _wkDragSrc=null;
let _wkTaskDrag=null;

function deleteWkDay(day){
  if(!confirm(`Delete "${day.label}" and all its tasks?`)) return false;
  const d=loadWkData()||{days:[]};
  d.days=d.days.filter(x=>x.id!==day.id);
  saveWkData(d);
  const ord=getOrderedWkDays().filter(x=>x.id!==day.id);
  saveWkOrder(ord.map(x=>x.id));
  if(getWkActive()===day.id){
    const remaining=getOrderedWkDays().filter(x=>x.id!==day.id);
    setWkActive(remaining[0]?.id||"");
  }
  renderWeekly(); showToast("Day deleted");
  return true;
}

function renderWeeklySidebar(){
  const sb=document.getElementById("wkDayTabs"); if(!sb) return;
  sb.innerHTML="";
  const days=getOrderedWkDays();
  const active=getWkActive();

  days.forEach(day=>{
    const items=day.items||[];
    const undone=items.filter(t=>!t.done).length;
    const isAct=active===day.id;
    const isToday=day.id===todayWkId;
    const col=WK_TAB_COLORS[day.id]||WK_TAB_COLORS["wk-mon"];

    const tab=document.createElement("div");
    tab.className="wk-day-tab"+(isAct?" active":"")+(isToday?" is-today":"");
    tab.dataset.id=day.id;
    if(isToday) tab.style.setProperty("--wk-pulse-color", col.border);
    if(isAct){ tab.style.background=col.bg; tab.style.borderColor=col.border; }
    else{
      tab.addEventListener("mouseenter",()=>{ tab.style.background=col.bg; tab.style.borderColor=col.border; });
      tab.addEventListener("mouseleave",()=>{ tab.style.background=""; tab.style.borderColor="transparent"; });
    }

    const grip=document.createElement("span"); grip.className="wk-grip"; grip.textContent="⠿"; grip.title="Drag to reorder";
    const body=document.createElement("div"); body.className="wk-body";
    const ico=document.createElement("span"); ico.className="wk-icon"; ico.textContent=day.icon;
    const lbl=document.createElement("span"); lbl.className="wk-label"; lbl.textContent=day.label;
    const cnt=document.createElement("span"); cnt.className="wk-count"; cnt.textContent=undone||""; cnt.style.display=undone?"":"none";
    // rename on dblclick
    lbl.ondblclick=e=>{
      e.stopPropagation();
      const inp=document.createElement("input"); inp.value=lbl.textContent;
      inp.style.cssText="font:inherit;color:inherit;background:transparent;border:none;outline:1px solid var(--accent);border-radius:3px;padding:0 2px;width:100%;min-width:50px;";
      lbl.replaceWith(inp); inp.focus(); inp.select();
      const save2=()=>{
        const v=inp.value.trim()||day.label;
        const d=loadWkData()||{days:[]};
        const idx=d.days.findIndex(x=>x.id===day.id); if(idx>-1) d.days[idx].label=v;
        saveWkData(d); renderWeeklySidebar(); if(isAct) renderWeeklyCard(day.id);
      };
      inp.onblur=save2; inp.onkeydown=e2=>{ if(e2.key==="Enter")inp.blur(); if(e2.key==="Escape"){inp.value=day.label;inp.blur();} };
    };
    body.appendChild(ico); body.appendChild(lbl); body.appendChild(cnt);

    const del=document.createElement("button"); del.className="wk-day-del"; del.textContent="✕"; del.title="Delete this day";
    del.onclick=e=>{ e.stopPropagation(); deleteWkDay(day); };

    tab.appendChild(grip); tab.appendChild(body); tab.appendChild(del);

    // click to open
    tab.addEventListener("click",e=>{
      if(e.target.tagName==="INPUT"||e.target===del) return;
      if(getWkActive()===day.id){ setWkActive(""); closeWkCard(); }
      else { setWkActive(day.id); renderWeeklyCard(day.id); renderWeeklySidebar(); }
    });

    // drag reorder
    grip.addEventListener("pointerdown",()=>tab.draggable=true);
    tab.addEventListener("pointerup",()=>tab.draggable=false);
    tab.addEventListener("dragstart",e=>{ _wkDragSrc=day.id; tab.style.opacity=".35"; e.dataTransfer.setData("text/plain",day.id); });
    tab.addEventListener("dragend",()=>{ tab.draggable=false; tab.style.opacity=""; _wkDragSrc=null; sb.querySelectorAll(".wk-day-tab").forEach(t=>t.style.boxShadow=""); });
    tab.addEventListener("dragover",e=>{ if(!_wkDragSrc||_wkDragSrc===day.id) return; e.preventDefault(); tab.style.boxShadow="inset 0 2px 0 var(--accent)"; });
    tab.addEventListener("dragleave",()=>tab.style.boxShadow="");
    tab.addEventListener("drop",e=>{
      if(!_wkDragSrc||_wkDragSrc===day.id) return; e.preventDefault(); tab.style.boxShadow="";
      const ordered=getOrderedWkDays(), ids=ordered.map(x=>x.id);
      const fi=ids.indexOf(_wkDragSrc), ti=ids.indexOf(day.id);
      if(fi<0||ti<0) return;
      ids.splice(fi,1); ids.splice(ti,0,_wkDragSrc);
      saveWkOrder(ids); _wkDragSrc=null; renderWeeklySidebar();
    });

    sb.appendChild(tab);
  });
}

function closeWkCard(){
  const area=document.getElementById("wkCardArea"); if(area) area.innerHTML="";
}

function renderWeeklyCard(dayId){
  const area=document.getElementById("wkCardArea"); if(!area) return;
  area.innerHTML="";
  const d=loadWkData()||{days:[]};
  const day=d.days.find(x=>x.id===dayId); if(!day){ area.innerHTML='<div style="padding:40px;text-align:center;color:var(--text3);">Day not found.</div>'; return; }
  const items=day.items||[];
  const done=items.filter(t=>t.done).length, total=items.length, pct=total?Math.round(done/total*100):0;

  const card=document.createElement("div"); card.className=`wk-card ${day.cls||""}`;

  // header
  const hdr=document.createElement("div"); hdr.className="wk-card-hdr";
  const titleWrap=document.createElement("div");
  const te=document.createElement("div"); te.className="wk-card-title"; te.textContent=day.icon+" "+(WK_FULL_DAY[day.label]||day.label);
  const se=document.createElement("div"); se.className="wk-card-subtitle";
  se.textContent=new Date().toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  titleWrap.appendChild(te); titleWrap.appendChild(se);

  const acts=document.createElement("div"); acts.className="wk-card-actions";
  // ☐ All
  const allBtn=document.createElement("button"); allBtn.style.cssText="font-size:11px;padding:3px 9px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;";
  allBtn.textContent=(total>0&&done===total)?"☑ All":"☐ All";
  allBtn.onclick=()=>{
    const d2=loadWkData()||{days:[]}; const idx=d2.days.findIndex(x=>x.id===dayId); if(idx<0) return;
    const a=d2.days[idx].items.every(t=>t.done); d2.days[idx].items.forEach(t=>t.done=!a);
    saveWkData(d2); renderWeeklyCard(dayId); renderWeeklySidebar(); updateWkProgress();
  };
  // stat badge
  const stat=document.createElement("div"); stat.style.cssText="font-size:11px;font-weight:600;color:var(--text3);background:var(--surface);border-radius:20px;padding:2px 9px;border:1px solid var(--border);";
  stat.textContent=total?(done+"/"+total):"0";
  // Uncheck
  const unchk=document.createElement("button"); unchk.style.cssText="font-size:11px;padding:3px 9px;border-radius:8px;border:1px solid rgba(232,92,92,.3);background:rgba(232,92,92,.08);color:#c05050;cursor:pointer;font-family:'DM Sans',sans-serif;";
  unchk.textContent="↺ Uncheck";
  unchk.onclick=()=>{ const d2=loadWkData()||{days:[]}; const idx=d2.days.findIndex(x=>x.id===dayId); if(idx<0) return; d2.days[idx].items.forEach(t=>t.done=false); saveWkData(d2); renderWeeklyCard(dayId); renderWeeklySidebar(); updateWkProgress(); };

  acts.appendChild(allBtn); acts.appendChild(stat); acts.appendChild(unchk);
  hdr.appendChild(titleWrap); hdr.appendChild(acts);

  // progress bar
  const prog=document.createElement("div"); prog.className="wk-prog";
  prog.innerHTML=`<div class="wk-prog-fill" style="width:${pct}%"></div>`;

  const body=document.createElement("div"); body.className="wk-card-body";

  // add task input
  const nt=document.createElement("div"); nt.className="wk-new-task";
  nt.innerHTML='<input placeholder="Add task… (Enter to save)">';
  const ni=nt.querySelector("input");
  ni.onkeydown=e=>{ if(e.key==="Enter"){ const v=ni.value.trim(); if(!v) return; const d2=loadWkData()||{days:[]}; const idx=d2.days.findIndex(x=>x.id===dayId); if(idx<0) return; d2.days[idx].items.unshift({text:v.charAt(0).toUpperCase()+v.slice(1),done:false}); saveWkData(d2); renderWeeklyCard(dayId); renderWeeklySidebar(); setTimeout(()=>ni.focus(),0); showToast("✓ Task added"); } e.stopPropagation(); };
  body.appendChild(nt);

  // task rows
  items.forEach((item,i)=>{
    const row=document.createElement("div"); row.className="wk-task"+(item.done?" completed":"");

    const handle=document.createElement("span"); handle.className="wk-drag-handle"; handle.textContent="⠿";
    handle.onpointerdown=()=>row.draggable=true; handle.onpointerup=()=>row.draggable=false; handle.onmouseleave=()=>row.draggable=false;
    row.addEventListener("dragstart",e=>{ if(!row.draggable){e.preventDefault();return;} _wkTaskDrag={dayId,fromIdx:i}; row.classList.add("dragging"); e.dataTransfer.effectAllowed="move"; e.dataTransfer.setData("text/plain",""); e.stopPropagation(); });
    row.addEventListener("dragend",()=>{ row.classList.remove("dragging"); row.draggable=false; setTimeout(()=>_wkTaskDrag=null,50); body.querySelectorAll(".wk-task").forEach(r=>r.classList.remove("wk-drag-over")); });
    row.addEventListener("dragover",e=>{ if(!_wkTaskDrag||_wkTaskDrag.dayId!==dayId) return; e.preventDefault(); body.querySelectorAll(".wk-task").forEach(r=>r.classList.remove("wk-drag-over")); row.classList.add("wk-drag-over"); });
    row.addEventListener("drop",e=>{ if(!_wkTaskDrag||_wkTaskDrag.dayId!==dayId) return; e.preventDefault(); body.querySelectorAll(".wk-task").forEach(r=>r.classList.remove("wk-drag-over")); const from=_wkTaskDrag.fromIdx; _wkTaskDrag=null; if(from===i) return; const d2=loadWkData()||{days:[]}; const idx=d2.days.findIndex(x=>x.id===dayId); if(idx<0) return; const arr=d2.days[idx].items; const [mv]=arr.splice(from,1); arr.splice(from<i?i-1:i,0,mv); saveWkData(d2); renderWeeklyCard(dayId); });

    // SVG checkbox
    const cbSvg=document.createElement("span"); cbSvg.className="wk-cb-svg"+(item.done?" on":"");
    cbSvg.innerHTML='<svg width="18" height="18" viewBox="0 0 20 20" style="overflow:visible;"><rect class="wk-cb-box" x="2" y="2" width="16" height="16" rx="4"/><path class="wk-cb-tick" d="M5 10 L8.5 13.5 L22 3"/></svg>';
    cbSvg.addEventListener("click",e=>{ e.stopPropagation(); toggle(); });

    const tx=document.createElement("input"); tx.type="text"; tx.className="wk-task-text"; tx.value=item.text;
    if(item.done) tx.style.cssText="text-decoration:line-through;opacity:0.44;";
    tx.oninput=()=>{ const d2=loadWkData()||{days:[]}; const idx=d2.days.findIndex(x=>x.id===dayId); if(idx>=0&&d2.days[idx].items[i]) d2.days[idx].items[i].text=tx.value; saveWkData(d2); };
    tx.onkeydown=e=>{ if(e.key==="Enter"){ tx.blur(); } e.stopPropagation(); };
    tx.addEventListener("mousedown",e=>{ row.draggable=false; e.stopPropagation(); });

    const delBtn=document.createElement("button"); delBtn.className="wk-task-btn del"; delBtn.title="Remove"; delBtn.textContent="✕";
    delBtn.onclick=e=>{ e.stopPropagation(); const d2=loadWkData()||{days:[]}; const idx=d2.days.findIndex(x=>x.id===dayId); if(idx>=0) d2.days[idx].items.splice(i,1); saveWkData(d2); renderWeeklyCard(dayId); renderWeeklySidebar(); updateWkProgress(); };

    function toggle(){
      const d2=loadWkData()||{days:[]}; const idx=d2.days.findIndex(x=>x.id===dayId); if(idx<0) return;
      const arr=d2.days[idx].items; if(!arr[i]) return;
      arr[i].done=!arr[i].done;
      // sort done to bottom
      const undone2=arr.filter(t=>!t.done), done2=arr.filter(t=>t.done);
      d2.days[idx].items=[...undone2,...done2];
      saveWkData(d2); renderWeeklyCard(dayId); renderWeeklySidebar(); updateWkProgress();
    }

    row.appendChild(handle); row.appendChild(cbSvg); row.appendChild(tx); row.appendChild(delBtn);
    body.appendChild(row);
  });

  // unified footer row
  const wkBtnRow=document.createElement("div"); wkBtnRow.className="r-block-btn-row";
  const addDayBtn2=document.createElement("button"); addDayBtn2.className="r-carry-btn"; addDayBtn2.textContent="＋ Add Day";
  addDayBtn2.onclick=()=>{ if(typeof window._openNewSectionModal==="function") window._openNewSectionModal(); };
  wkBtnRow.appendChild(addDayBtn2);
  if(items.some(t=>t.done)){
    const clr=document.createElement("button"); clr.className="r-clear-done-btn"; clr.textContent="✓ Clear completed";
    clr.onclick=()=>{ const d2=loadWkData()||{days:[]}; const idx=d2.days.findIndex(x=>x.id===dayId); if(idx>=0) d2.days[idx].items=d2.days[idx].items.filter(t=>!t.done); saveWkData(d2); renderWeeklyCard(dayId); renderWeeklySidebar(); updateWkProgress(); };
    wkBtnRow.appendChild(clr);
  }
  const rstDay=document.createElement("button"); rstDay.className="r-reset-btn"; rstDay.textContent="↺ Reset this day";
  rstDay.onclick=()=>{ const d2=loadWkData()||{days:[]}; const idx=d2.days.findIndex(x=>x.id===dayId); if(idx>=0) d2.days[idx].items.forEach(t=>t.done=false); saveWkData(d2); renderWeeklyCard(dayId); renderWeeklySidebar(); updateWkProgress(); };
  wkBtnRow.appendChild(rstDay);
  const delDayBtn=document.createElement("button"); delDayBtn.className="btn-danger-sm"; delDayBtn.textContent="🗑 Delete day";
  delDayBtn.onclick=()=>{ deleteWkDay(day); };
  wkBtnRow.appendChild(delDayBtn);
  body.appendChild(wkBtnRow);

  card.appendChild(hdr); card.appendChild(prog); card.appendChild(body);
  area.appendChild(card);
}

function updateWkProgress(){
  const d=loadWkData()||{days:[]};
  let total=0, done=0;
  (d.days||[]).forEach(day=>{ (day.items||[]).forEach(it=>{ total++; if(it.done) done++; }); });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById("overallFill").style.width=pct+"%";
  document.getElementById("overallPct").textContent=pct+"%";
  document.getElementById("footerStats").textContent=done+" of "+total+" tasks done";
  if(pct===100&&total>0){ fireConfetti(); showToast("🎉 All weekly tasks done!"); }
}

function renderWeekly(){
  initWkData();
  document.getElementById("bodyWeekly").style.display="";

  // restore active
  let active=getWkActive();
  const days=getOrderedWkDays();
  if(!active||!days.find(d=>d.id===active)){
    active=days[0]?.id||"";
    setWkActive(active);
  }

  renderWeeklySidebar();
  if(active) renderWeeklyCard(active);
  else closeWkCard();
  updateWkProgress();
}

/* ── Weekly Print Modal ── */
(function setupWkPrint(){
  const modal=document.getElementById("wkPrintModal");
  const checks=document.getElementById("wkPrintChecks");
  const selAll=document.getElementById("wkPrintSelAll");
  const selNone=document.getElementById("wkPrintSelNone");
  const cancelBtn=document.getElementById("wkPrintCancel");
  const bwBtn=document.getElementById("wkPrintBW");
  const colorBtn=document.getElementById("wkPrintColor");
  if(!modal) return;

  function openPrintModal(){
    checks.innerHTML="";
    const days=getOrderedWkDays();
    days.forEach(day=>{
      const label=document.createElement("label"); label.className="wk-modal-check";
      const cb=document.createElement("input"); cb.type="checkbox"; cb.value=day.id; cb.checked=true;
      label.appendChild(cb);
      label.appendChild(document.createTextNode(" "+day.icon+" "+day.label));
      checks.appendChild(label);
    });
    modal.classList.add("open");
  }

  selAll.onclick=()=>checks.querySelectorAll("input").forEach(c=>c.checked=true);
  selNone.onclick=()=>checks.querySelectorAll("input").forEach(c=>c.checked=false);

  function getSelectedIds(){ return [...checks.querySelectorAll("input:checked")].map(c=>c.value); }

  bwBtn.onclick=()=>{ const ids=getSelectedIds(); if(!ids.length){showToast("⚠ Select at least one day");return;} modal.classList.remove("open"); printWeeklyBW(ids); };
  colorBtn.onclick=()=>{ const ids=getSelectedIds(); if(!ids.length){showToast("⚠ Select at least one day");return;} modal.classList.remove("open"); printWeeklyColor(ids); };

  window._openWkPrintModal=openPrintModal;
})();

function printWeeklyBW(ids){
  const d=loadWkData()||{days:[]};
  const days=getOrderedWkDays().filter(day=>ids.includes(day.id));
  const now=new Date().toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  let sectionsHTML="";
  days.forEach(day=>{
    const items=day.items||[];
    const done=items.filter(t=>t.done).length, total=items.length;
    let rowsHTML="";
    items.forEach(item=>{ rowsHTML+=`<div style="display:flex;align-items:center;padding:5px 0;border-bottom:1px solid #e0d8ce;"><span style="display:inline-block;width:13px;height:13px;border:1.5px solid #888;border-radius:3px;margin-right:8px;flex-shrink:0;${item.done?"background:#555;":"background:#fff;"}">${item.done?'<span style="color:#fff;font-size:9px;line-height:13px;display:block;text-align:center;">✓</span>':""}</span><span style="font-size:12.5px;color:#1a1714;${item.done?"text-decoration:line-through;opacity:.5;":""}">${item.text.replace(/</g,"&lt;")}</span></div>`; });
    sectionsHTML+=`<div style="break-inside:avoid;page-break-inside:avoid;border:1.5px solid #ccc;border-radius:8px;overflow:hidden;margin-bottom:14px;"><div style="padding:9px 12px;border-bottom:1px solid #ccc;display:flex;justify-content:space-between;background:#f5f2ee;"><span style="font-family:'DM Serif Display',Georgia,serif;font-size:14px;">${day.icon} ${day.label}</span><span style="font-size:11px;color:#666;">${done}/${total}</span></div><div style="padding:6px 12px 10px;">${rowsHTML||"<div style='font-size:12px;color:#aaa;padding:8px 0;'>No tasks</div>"}</div></div>`;
  });
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Weekly — B&W — ${now}</title><link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'DM Sans',sans-serif;color:#1a1714;background:#fff;padding:22px 26px;}@page{size:A4;margin:12mm 10mm;}@media print{body{padding:0;}}</style></head><body><div style="margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid #1a1714;display:flex;justify-content:space-between;align-items:flex-end;"><div><div style="font-family:'DM Serif Display',Georgia,serif;font-size:26px;">Weekly Planner</div><div style="font-size:12px;color:#666;margin-top:4px;">${now}</div></div></div>${sectionsHTML}</body></html>`;
  const w=window.open("","_blank"); w.document.write(html); w.document.close(); w.onload=()=>{w.focus();w.print();};
}

function printWeeklyColor(ids){
  const days=getOrderedWkDays().filter(day=>ids.includes(day.id));
  const now=new Date().toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const PALS={"wk-mon":{bg:"#e8e4f0",hdr:"#d8d4e8",accent:"#4a3a8a",border:"#b8aed8"},"wk-tue":{bg:"#fdf3e0",hdr:"#f5e8c8",accent:"#8a6020",border:"#d4b870"},"wk-wed":{bg:"#e0e8f5",hdr:"#ccdaee",accent:"#2e5e96",border:"#a8c4de"},"wk-thu":{bg:"#fde8cc",hdr:"#f5d8b0",accent:"#7a4a10",border:"#d4a860"},"wk-fri":{bg:"#fdddd0",hdr:"#f5c8b8",accent:"#8a2e2e",border:"#d48878"},"wk-sat":{bg:"#fff5e0",hdr:"#fce8c0",accent:"#8a5c10",border:"#d4a840"},"wk-sun":{bg:"#ffefdc",hdr:"#fce0c0",accent:"#8a5010",border:"#d49840"}};
  const fallPal={bg:"#f5f0ea",hdr:"#ede5d8",accent:"#6b5540",border:"#c8b898"};
  let sectionsHTML="";
  days.forEach(day=>{
    const items=day.items||[]; const done=items.filter(t=>t.done).length, total=items.length;
    const pal=PALS[day.id]||fallPal;
    let rowsHTML=""; items.forEach(item=>{ rowsHTML+=`<div style="display:flex;align-items:center;padding:5px 0;border-bottom:1px solid ${pal.hdr};"><span style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border:1.5px solid ${pal.border};border-radius:3px;margin-right:8px;flex-shrink:0;${item.done?`background:${pal.accent};`:""}">${item.done?`<span style="color:#fff;font-size:10px;line-height:1;">✓</span>`:""}</span><span style="font-size:12.5px;color:#1a1714;${item.done?`text-decoration:line-through;opacity:.5;`:""}">${item.text.replace(/</g,"&lt;")}</span></div>`; });
    sectionsHTML+=`<div style="break-inside:avoid;page-break-inside:avoid;border:1.5px solid ${pal.border};border-radius:8px;overflow:hidden;margin-bottom:14px;background:${pal.bg};"><div style="padding:9px 12px;border-bottom:1.5px solid ${pal.border};display:flex;justify-content:space-between;background:${pal.hdr};"><span style="font-family:'DM Serif Display',Georgia,serif;font-size:14px;color:${pal.accent};">${day.icon} ${day.label}</span><span style="font-size:11px;color:${pal.accent};opacity:.7;">${done}/${total}</span></div><div style="padding:6px 12px 10px;">${rowsHTML||`<div style='font-size:12px;color:${pal.accent};opacity:.5;padding:8px 0;'>No tasks</div>`}</div></div>`;
  });
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Weekly — Colour — ${now}</title><link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'DM Sans',sans-serif;color:#1a1714;background:#fff;padding:22px 26px;}@page{size:A4;margin:12mm 10mm;}@media print{body{padding:0;}}</style></head><body><div style="background:linear-gradient(135deg,#f5f0ea,#ede5d8 60%,#e0d4c4);border-radius:10px;padding:18px 22px 14px;margin-bottom:18px;border:1.5px solid #d8ccbc;"><div style="font-family:'DM Serif Display',Georgia,serif;font-size:26px;color:#3a2e20;">Weekly Planner</div><div style="font-size:12px;color:#7a6a56;margin-top:4px;">${now}</div></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;">${sectionsHTML}</div></body></html>`;
  const w=window.open("","_blank"); w.document.write(html); w.document.close(); w.onload=()=>{w.focus();w.print();};
}

function renderSimple(mode){
  renderSimpleSidebar(mode);
  renderSimpleContent(mode);
  updateSimpleProgress(mode);
}

/* ══════════════════════════════════════════════════════════
   SIMPLE SIDEBAR TOGGLE
══════════════════════════════════════════════════════════ */
document.getElementById("btnSidebarToggleSimple").addEventListener("click", e=>{
  e.stopPropagation();
  const sidebar=document.getElementById("rSidebarSimple");
  const btn=document.getElementById("btnSidebarToggleSimple");
  const collapsed=!sidebar.classList.contains("collapsed");
  sidebar.classList.toggle("collapsed",collapsed);
  btn.textContent=collapsed?"▶":"◀";
  saveSimpleCollapsed(activeMode,collapsed);
});

/* ══════════════════════════════════════════════════════════
   NEW SECTION / NEW DAY MODAL (Simple modes + Weekly)
══════════════════════════════════════════════════════════ */
const NSS_ICONS=["🧹","🌿","💻","📅","💆","💰","💪","🏡","🎯","📋","⭐","🔥","🧘","🍳","📚","🌙","🌅","🖥️","💼","🏃","🎵","🧠","🛒","💊","🌱","🔑","☀️","🍵","✈️","🌊","🎨","🔮","🚗","🏋️"];
let _nssIcon="📋";
(function setupNSSModal(){
  const modal=document.getElementById("newSimpleSectionModal");
  const nameInp=document.getElementById("nssName");
  const iconGrid=document.getElementById("nssIconGrid");
  const cancel=document.getElementById("nssCancel");
  const create=document.getElementById("nssCreate");
  NSS_ICONS.forEach(ic=>{
    const btn=document.createElement("button"); btn.className="icon-opt"+(ic===_nssIcon?" selected":""); btn.textContent=ic;
    btn.onclick=()=>{ _nssIcon=ic; iconGrid.querySelectorAll(".icon-opt").forEach(b=>b.classList.toggle("selected",b.textContent===ic)); };
    iconGrid.appendChild(btn);
  });
  function openModal(){
    const isWeekly=activeMode==="weekly";
    document.getElementById("newSimpleSectionTitle").textContent=(isWeekly?"New Day — ":"New Section — ")+MODE_META[activeMode].label;
    nameInp.placeholder=isWeekly?"e.g. Monday":"e.g. Health";
    nameInp.value=""; _nssIcon=isWeekly?"📅":"📋";
    iconGrid.querySelectorAll(".icon-opt").forEach(b=>b.classList.toggle("selected",b.textContent===_nssIcon));
    modal.classList.add("open"); setTimeout(()=>nameInp.focus(),80);
  }
  document.getElementById("btnAddSimpleSection").onclick=openModal;
  const wkAddBtn=document.getElementById("wkAddDayBtn"); if(wkAddBtn) wkAddBtn.onclick=openModal;
  window._openNewSectionModal=openModal;
  cancel.onclick=()=>modal.classList.remove("open");
  modal.onclick=e=>{ if(e.target===modal) modal.classList.remove("open"); };
  nameInp.addEventListener("keydown",e=>{ if(e.key==="Enter") create.click(); });
  create.onclick=()=>{
    const name=nameInp.value.trim(); if(!name){ nameInp.focus(); return; }
    if(activeMode==="weekly"){
      const id="wk-custom-"+Date.now();
      const clsKeys=["wk-slot-mon","wk-slot-tue","wk-slot-wed","wk-slot-thu","wk-slot-fri","wk-slot-sat","wk-slot-sun"];
      const d=loadWkData()||{days:[]};
      const cls=clsKeys[d.days.length%clsKeys.length];
      d.days.push({id,icon:_nssIcon,label:name,cls,items:[]});
      saveWkData(d);
      const ord=getOrderedWkDays().map(x=>x.id); ord.push(id); saveWkOrder(ord);
      setWkActive(id);
      modal.classList.remove("open"); renderWeekly(); showToast("✓ Day added");
      return;
    }
    const sArr=loadSimpleSections(activeMode)||[];
    const id="simple_"+activeMode+"_"+Date.now();
    const cls=SIMPLE_CLS_CYCLE[sArr.length%SIMPLE_CLS_CYCLE.length];
    sArr.push({id,icon:_nssIcon,label:name,cls});
    saveSimpleSections(activeMode,sArr);
    const d2=loadSimpleData(activeMode); d2[id]={items:[]}; saveSimpleData(activeMode,d2);
    _simpleActiveId[activeMode]=id;
    modal.classList.remove("open"); renderSimple(activeMode); showToast("✓ Section created");
  };
})();


OT.onReady(async () => {
  _otCache = await OT.getAll();
  // Theme/accent/font now applied centrally by storage.js — not handled here.
  initData();
  // Restore active mode tab
  const savedMode = _cget(MODE_KEY);
  if(savedMode && MODES.includes(savedMode)){
    activeMode = savedMode;
  }
  // Restore simple active sections
  MODES.filter(m=>m!=="daily").forEach(m=>{
    const saved=loadSimpleActive(m); if(saved) _simpleActiveId[m]=saved;
  });
  setMode(activeMode);
});
</script>

<script>
/* ── Nav collapse/expand ── */
(function(){
  var nav=document.getElementById('onetrack-nav');
  var btn=document.getElementById('nav-toggle-btn');
  var tab=document.getElementById('nav-show-tab');
  function isCollapsed(){ return _cget('ONETRACK_NAV_COLLAPSED')==='1'; }
  function applyState(collapsed, animate) {
    if (!animate) { nav.style.transition = 'none'; }
    if (collapsed) {
      nav.classList.add('nav-collapsed');
      document.body.classList.add('nav-is-collapsed');
      if (btn) btn.textContent = '›';
      if (btn) btn.title = 'Show sidebar';
    } else {
      nav.classList.remove('nav-collapsed');
      document.body.classList.remove('nav-is-collapsed');
      if (btn) btn.textContent = '‹';
      if (btn) btn.title = 'Hide sidebar';
    }
    if (!animate) {
      void nav.offsetWidth;
      nav.style.transition = '';
    }
  }

  applyState(isCollapsed(), false);

  if (btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var next = !isCollapsed();
      _cset('ONETRACK_NAV_COLLAPSED', next ? '1' : '0');
      applyState(next, true);
    });
  }

  if (tab) {
    tab.addEventListener('click', function() {
      _cset('ONETRACK_NAV_COLLAPSED', '0');
      applyState(false, true);
    });
  }
})();
</script>
