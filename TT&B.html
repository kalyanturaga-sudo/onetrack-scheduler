function saveTmrwSlotLabels(l){ localStorage.setItem(TMRW_SLOT_LABELS_KEY,JSON.stringify(l)); }

/* ── build slot block (reused by sidebar drawer) ── */
function buildTmrwSlotBlock(slot){
  const meta=SLOT_META[slot];
  const items=data[slot];
  const done=items.filter(t=>t.done).length;
  const total=items.length;
  const pct=total?Math.round(done/total*100):0;
  const totalMins=items.reduce((s,t)=>s+(parseInt(t.mins)||0),0);

  const block=document.createElement("div");
  block.className=`block ${meta.cls}`;
  block.dataset.slot=slot;
  block.style.cssText="border:2px solid var(--border);box-shadow:var(--shadow);border-radius:var(--radius);overflow:hidden;";

  block.innerHTML=`
    <div class="block-header">
      <div class="block-title"><span class="slot-icon">${meta.icon}</span><span>${meta.label}</span></div>
      <div style="display:flex;align-items:center;gap:6px;">
        <button class="btn-all-toggle" title="Toggle all" style="font-size:11px;padding:2px 7px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;">${total>0&&done===total?'☑':'☐'} All</button>
        <div class="block-stats">${total?`${done}/${total}`:""} ${totalMins?`· ${totalMins}m`:""}</div>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="block-body"></div>
  `;
  const body=block.querySelector(".block-body");
  block.querySelector(".btn-all-toggle").onclick=()=>{const allDone=data[slot].every(t=>t.done);data[slot].forEach(t=>t.done=!allDone);save();renderTmrwSlotContent(slot);buildTmrwSidebar();updateStats();};

  const nt=document.createElement("div");
  nt.className="new-task";
  nt.innerHTML=`<input placeholder="Add task… (Enter to save)">`;
  nt.querySelector("input").onkeydown=e=>{
    if(e.key==="Enter"){
      const val=cap(e.target.value.trim());
      if(!val)return;
      data[slot].unshift({text:val,done:false,sub:false,priority:"none",mins:""});
      save(); renderTmrwSlotContent(slot); buildTmrwSidebar();
      setTimeout(()=>block.querySelector(".new-task input")?.focus(),0);
    }
  };
  body.appendChild(nt);

  items.forEach((item,i)=>{
    const row=document.createElement("div");
    row.className="task"+(item.sub?" subtask":"");
    row.innerHTML=`
      <span class="drag-handle">⠿</span>
      <input type="checkbox" class="task-cb" ${item.done?"checked":""} style="accent-color:var(--accent);width:16px;height:16px;cursor:pointer;flex-shrink:0;">
      <input type="text" class="task-text" value="${item.text.replace(/"/g,'&quot;')}">
      <select class="time-est">
        <option value="" ${!item.mins?'selected':''}>— min —</option>
        <option value="15" ${item.mins==='15'?'selected':''}>15 min</option>
        <option value="30" ${item.mins==='30'?'selected':''}>30 min</option>
        <option value="45" ${item.mins==='45'?'selected':''}>45 min</option>
        <option value="60" ${item.mins==='60'?'selected':''}>1 hour</option>
      </select>
      <button class="task-btn" title="Subtask">↳</button>
      <button class="xmove-btn" title="Send to another page">↗</button>
      <button class="task-btn" title="Remove">✕</button>
    `;

    const handle=row.querySelector(".drag-handle");
    const cb=row.querySelector(".task-cb");
    const pdot=row.querySelectorAll("span")[1];
    const tx=row.querySelector(".task-text");
    const te=row.querySelector(".time-est");
    const [subBtn,delBtn]=row.querySelectorAll(".task-btn");

    if(item.done){ tx.style.textDecoration="line-through"; tx.style.opacity="0.45"; }

    handle.onpointerdown=()=>{row.draggable=true;};
    handle.onpointerup=()=>{if(!dragState)row.draggable=false;};
    tx.addEventListener("mousedown",e=>{ row.draggable=false; e.stopPropagation(); });
    // removed mouseleave — it fires mid-drag and kills the drag
    row.addEventListener("dragstart",e=>{
      if(!row.draggable){e.preventDefault();return;}
      let group=[i];
      if(!item.sub){ for(let j=i+1;j<data[slot].length;j++){ if(!data[slot][j].sub) break; group.push(j); } }
      dragState={fromSlot:slot,fromIndex:i,groupSize:group.length};
      row.classList.add("dragging");
      group.slice(1).forEach(gi=>{ const r=body.querySelectorAll('.task')[gi]; if(r) r.classList.add('dragging'); });
      e.dataTransfer.effectAllowed="move";
      e.dataTransfer.setData("text/plain","");
      // highlight sidebar drop targets
      const sb2=document.getElementById("tomorrow__slotSidebar");
      if(sb2){ sb2.classList.add("xslot-dragging"); sb2.querySelectorAll(".v-slot-tab").forEach(t=>{ if(t.dataset.id!==slot) t.setAttribute("data-xdrop","1"); }); }
    });
    row.addEventListener("dragend",()=>{
      body.querySelectorAll('.task').forEach(r=>r.classList.remove("dragging")); row.draggable=false; dragState=null;
      const sb2=document.getElementById("tomorrow__slotSidebar");
      if(sb2){ sb2.classList.remove("xslot-dragging"); sb2.querySelectorAll(".v-slot-tab").forEach(t=>{ t.removeAttribute("data-xdrop"); t.classList.remove("xslot-drag-over"); }); }
    });

    cb.onchange=()=>{
      item.done=cb.checked;
      const ci=data[slot].indexOf(item);
      if(ci===-1){save();renderTmrwSlotContent(slot);buildTmrwSidebar();return;}
      if(!item.sub){
        for(let j=ci+1;j<data[slot].length;j++){
          if(!data[slot][j].sub) break;
          data[slot][j].done=item.done;
        }
      }
      if(item.sub){
        let parentIdx=-1;
        for(let j=ci-1;j>=0;j--){ if(!data[slot][j].sub){ parentIdx=j; break; } }
        if(parentIdx>=0){
          if(!item.done){ data[slot][parentIdx].done=false; }
          else {
            let allDone=true;
            for(let j=parentIdx+1;j<data[slot].length;j++){
              if(!data[slot][j].sub) break;
              if(!data[slot][j].done){ allDone=false; break; }
            }
            if(allDone) data[slot][parentIdx].done=true;
          }
        }
      }
      data[slot]=sortDoneToBottom(data[slot]);
      save(); renderTmrwSlotContent(slot); buildTmrwSidebar();
    };
    tx.oninput=e=>{item.text=e.target.value;save();};
    tx.onkeydown=e=>{ if(e.key==="Enter"){ item.text=tx.value; save(); tx.blur(); } };
    te.onchange=e=>{item.mins=e.target.value;save();renderTmrwSlotContent(slot);buildTmrwSidebar();};
    subBtn.onclick=()=>{item.sub=!item.sub;save();renderTmrwSlotContent(slot);};
    delBtn.onclick=()=>{data[slot].splice(i,1);save();renderTmrwSlotContent(slot);buildTmrwSidebar();};
    const xmoveBtn=row.querySelector(".xmove-btn");
    if(xmoveBtn) xmoveBtn.onclick=e=>{
      e.stopPropagation();
      openTmrwXPortal(xmoveBtn, ()=>({...item}), (lbl)=>{
        data[slot].splice(i,1); save(); renderTmrwSlotContent(slot); buildTmrwSidebar();
        showToast("↗ Sent to " + lbl);
      });
    };

    body.appendChild(row);
  });

  block.addEventListener("dragover",e=>{if(!dragState)return;e.preventDefault();});
  block.addEventListener("drop",e=>{
    if(!dragState)return;e.preventDefault();
    const{fromSlot,fromIndex,groupSize=1}=dragState;
    let toIndex=getDropIndex(block,e.clientY);
    const group=data[fromSlot].splice(fromIndex,groupSize);
    if(fromSlot===slot&&fromIndex<toIndex)toIndex=Math.max(0,toIndex-groupSize);
    data[slot].splice(toIndex,0,...group);
    save(); dragState=null; renderTmrwSlotContent(slot); if(fromSlot!==slot) renderTmrwSlotContent(fromSlot); buildTmrwSidebar();
  });

  return block;
}

/* ── render the content pane for a given slot ── */
function renderTmrwSlotContent(slot){
  const drawer=document.getElementById("tomorrow__slotContent");
  if(!drawer) return;
  // Only re-render if this slot is currently active
  if(getTmrwActiveSlot()!==slot) return;
  drawer.innerHTML="";
  drawer.appendChild(buildTmrwSlotBlock(slot));
  updateStats();
}

/* ── build/rebuild the vertical sidebar ── */
function buildTmrwSidebar(){
  const sb=document.getElementById("tomorrow__slotSidebar"); if(!sb) return;
  sb.innerHTML="";
  const order=loadTmrwSlotOrder(), labels=loadTmrwSlotLabels(), active=getTmrwActiveSlot();
  let dragSrcTmrw=null;

  order.forEach(slotId=>{
    const meta=SLOT_META[slotId]; if(!meta) return;
    const label=labels[slotId]||meta.label;
    const isAct=active===slotId;
    const undone=(data[slotId]||[]).filter(t=>!t.done).length;

    const tab=document.createElement("div");
    tab.className="v-slot-tab"+(isAct?" active":"");
    tab.dataset.id=slotId; tab.draggable=false;

    if(isAct){
      tab.style.cssText=`background:${meta.tabColor};border-color:${meta.tabBorder};`;
    } else {
      tab.addEventListener("mouseenter",()=>{ tab.style.background=meta.tabColor; tab.style.borderColor=meta.tabBorder; });
      tab.addEventListener("mouseleave",()=>{ tab.style.background=""; tab.style.borderColor="transparent"; });
    }

    const grip=document.createElement("span"); grip.className="v-grip";
    grip.textContent="⠿"; grip.title="Drag to reorder";

    const body=document.createElement("div"); body.className="v-body";
    const ico=document.createElement("span"); ico.className="v-icon"; ico.textContent=meta.icon;
    const lbl=document.createElement("span"); lbl.className="v-label"; lbl.textContent=label;
    const cnt=document.createElement("span"); cnt.className="v-count";
    cnt.textContent=undone||""; cnt.style.display=undone?"":"none";

    lbl.ondblclick=e=>{
      e.stopPropagation();
      const inp=document.createElement("input");
      inp.value=lbl.textContent;
      inp.style.cssText="font:inherit;color:inherit;background:transparent;border:none;outline:1px solid var(--accent);border-radius:3px;padding:0 2px;width:100%;min-width:60px;";
      lbl.replaceWith(inp); inp.focus(); inp.select();
      const done=()=>{ const v=inp.value.trim()||label; const ls=loadTmrwSlotLabels(); ls[slotId]=v; saveTmrwSlotLabels(ls); buildTmrwSidebar(); };
      inp.onblur=done; inp.onkeydown=e2=>{ if(e2.key==="Enter") inp.blur(); if(e2.key==="Escape"){inp.value=label;inp.blur();} };
    };

    body.appendChild(ico); body.appendChild(lbl); body.appendChild(cnt);
    tab.appendChild(grip); tab.appendChild(body);

    tab.addEventListener("click",e=>{
      if(e.target.tagName==="INPUT") return;
      const drawerEl=document.getElementById("tomorrow__slotDrawer");
      const content=document.getElementById("tomorrow__slotContent");
      const emptyState=document.getElementById("tomorrow__emptyState");
      if(getTmrwActiveSlot()===slotId){
        setTmrwActiveSlot(null);
        if(content) content.innerHTML="";
        if(emptyState) emptyState.style.display="";
        if(drawerEl) drawerEl.style.display="none";
        buildTmrwSidebar();
      } else {
        setTmrwActiveSlot(slotId);
        if(content){ content.innerHTML=""; content.appendChild(buildTmrwSlotBlock(slotId)); }
        if(emptyState) emptyState.style.display="none";
        if(drawerEl) drawerEl.style.display="";
        buildTmrwSidebar();
        updateStats();
      }
    });

    grip.addEventListener("pointerdown",()=>{ tab.draggable=true; });
    tab.addEventListener("pointerup",()=>{ tab.draggable=false; });
    tab.addEventListener("dragstart",e=>{
      dragSrcTmrw=slotId; tab.classList.add("dragging");
      e.dataTransfer.effectAllowed="move"; e.dataTransfer.setData("text/plain",slotId);
    });
    tab.addEventListener("dragend",()=>{ tab.classList.remove("dragging"); sb.querySelectorAll(".v-slot-tab").forEach(t=>t.classList.remove("drag-over")); dragSrcTmrw=null; });
    tab.addEventListener("dragover",e=>{
      // Cross-slot task drop
      if(dragState && dragState.fromSlot !== slotId){ e.preventDefault(); tab.classList.add("xslot-drag-over"); return; }
      if(!dragSrcTmrw||dragSrcTmrw===slotId) return; e.preventDefault(); sb.querySelectorAll(".v-slot-tab").forEach(t=>t.classList.remove("drag-over")); tab.classList.add("drag-over");
    });
    tab.addEventListener("dragleave",()=>{ tab.classList.remove("drag-over"); tab.classList.remove("xslot-drag-over"); });
    tab.addEventListener("drop",e=>{
      // Cross-slot task drop
      if(dragState && dragState.fromSlot !== slotId){
        e.preventDefault(); e.stopPropagation();
        tab.classList.remove("xslot-drag-over");
        const{fromSlot,fromIndex,groupSize=1}=dragState;
        const group=data[fromSlot].splice(fromIndex,groupSize);
        if(!data[slotId]) data[slotId]=[];
        data[slotId].unshift(...group);
        save(); dragState=null;
        setTmrwActiveSlot(slotId);
        const content2=document.getElementById("tomorrow__slotContent");
        const emptyState2=document.getElementById("tomorrow__emptyState");
        const drawerEl2=document.getElementById("tomorrow__slotDrawer");
        if(content2){ content2.innerHTML=""; content2.appendChild(buildTmrwSlotBlock(slotId)); }
        if(emptyState2) emptyState2.style.display="none";
        if(drawerEl2) drawerEl2.style.display="";
        buildTmrwSidebar(); updateStats();
        const labels2=loadTmrwSlotLabels(), meta2=SLOT_META[slotId];
        showToast("⇄ Moved to "+(labels2[slotId]||meta2.label));
        return;
      }
      if(!dragSrcTmrw||dragSrcTmrw===slotId) return; e.preventDefault();
      const order2=loadTmrwSlotOrder();
      const fi=order2.indexOf(dragSrcTmrw),ti=order2.indexOf(slotId);
      order2.splice(fi,1); order2.splice(ti,0,dragSrcTmrw);
      saveTmrwSlotOrder(order2); buildTmrwSidebar();
    });

    sb.appendChild(tab);
  });
}

/* ── legacy grid render (used by calendar/export only) ── */
function render(){
  const grid=document.getElementById("tomorrow__grid");
  if(grid){ grid.innerHTML=""; SLOTS.forEach(slot=>{ const b=buildTmrwSlotBlock(slot); b.style.cssText=""; grid.appendChild(b); }); }
  // Restore active slot if one was previously selected
  const active=getTmrwActiveSlot();
  const content=document.getElementById("tomorrow__slotContent");
  const emptyState=document.getElementById("tomorrow__emptyState");
  const drawer=document.getElementById("tomorrow__slotDrawer");
  if(active && SLOTS.includes(active)){
    if(content){ content.innerHTML=""; content.appendChild(buildTmrwSlotBlock(active)); }
    if(emptyState) emptyState.style.display="none";
    if(drawer) drawer.style.display="";
  } else {
    if(content) content.innerHTML="";
    if(emptyState) emptyState.style.display="";
    if(drawer) drawer.style.display="none";
    setTmrwActiveSlot(null);
  }
  buildTmrwSidebar();
  updateStats();
}

document.getElementById("tomorrow__clearDone").onclick = () => {
  const count = SLOTS.reduce((n, s) => n + data[s].filter(t => t.done).length, 0);
  if (!count) { showToast("No done tasks to clear"); return; }
  if (!confirm(`Remove ${count} completed task${count > 1 ? "s" : ""} from Tomorrow?`)) return;
  SLOTS.forEach(s => { data[s] = data[s].filter(t => !t.done); });
  save();
  const active=getTmrwActiveSlot();
  if(active){ const c=document.getElementById("tomorrow__slotContent"); if(c){c.innerHTML="";c.appendChild(buildTmrwSlotBlock(active));} }
  buildTmrwSidebar(); updateStats();
  showToast(`✓ Cleared ${count} done task${count > 1 ? "s" : ""}`);
};

render();
})();
</script>
<script>
/* ===== OPERATIONS ===== */
(function(){
const STORAGE_KEY = "OPERATIONS_BLOCKS_V1";
const TODAY_KEY   = "TODAY_BLOCKS_V2";
const DARK_KEY    = "TODAY_DARK";
const LABELS_KEY  = "OPERATIONS_LABELS_V1";
const SLOTS_KEY   = "OPERATIONS_SLOTS_V1";

/* ── helpers ── */
function loadLabels(){
  if(typeof OT!=="undefined"&&OT.isReady()){ try{ const v=localStorage.getItem(LABELS_KEY); return JSON.parse(v||"{}"); }catch(e){} }
  return JSON.parse(localStorage.getItem(LABELS_KEY)||"{}");
}
function saveLabels(l){
  const s=JSON.stringify(l);
  localStorage.setItem(LABELS_KEY,s);
  if(typeof OT!=="undefined"&&OT.isReady()) OT.set(LABELS_KEY,s);
}

/* ── slot metadata — must be defined before migrate() ── */
const SLOT_META = {
  daily:   {label:"Daily Ops",        icon:"🔄", cls:"slot-daily"  },
  weekly:  {label:"Weekly Ops",       icon:"📅", cls:"slot-weekly" },
  monthly: {label:"Monthly Ops",      icon:"📆", cls:"slot-monthly"},
  systems: {label:"Systems & Checks", icon:"⚙️", cls:"slot-systems"},
  admin:   {label:"Admin",            icon:"📁", cls:"slot-admin"  },
  misc:    {label:"Misc",             icon:"✦",  cls:"slot-misc"   },
};
function getMeta(slot){
  if(SLOT_META[slot]) return SLOT_META[slot];
  const l=loadLabels(); return {label:l[slot]||slot, icon:"✦", cls:"slot-misc"};
}

/* ── one-time migration of former task-list data into ops ── */
(function migrate(){
  const MIG = "OPS_TL_MIGRATED_V1";
  if(localStorage.getItem(MIG)) return;
  const tl = JSON.parse(localStorage.getItem("CENTRALIZED_TASK_LIST_V2")||"null");
  if(!tl){ localStorage.setItem(MIG,"1"); return; }
  const opsRaw   = JSON.parse(localStorage.getItem(STORAGE_KEY)||"null") || {};
  const opsSlots = JSON.parse(localStorage.getItem(SLOTS_KEY)||"null") || ["daily","weekly","monthly","systems","admin","misc"];
  const labels   = JSON.parse(localStorage.getItem(LABELS_KEY)||"{}");
  const sections = [
    {key:"Immigration & Passports", icon:"🛂"},
    {key:"Tax, Legal & Government", icon:"⚖️"},
    {key:"Home, Travel & Personal", icon:"🏠"},
    {key:"Health & Family",         icon:"❤️"},
    {key:"Banking & Finance",       icon:"🏦"},
    {key:"Utilities & Subscriptions", icon:"📡"},
    {key:"Security & Digital Hygiene", icon:"🔐"},
    {key:"Work & Systems",          icon:"💼"},
  ];
  sections.forEach(sec=>{
    if(!tl[sec.key]||!tl[sec.key].length) return;
    const slug = "tl_" + sec.key.toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"");
    if(!opsRaw[slug]) opsRaw[slug] = tl[sec.key].map(t=>({text:t.text||"",done:!!t.done,sub:!!t.sub,priority:t.priority||"none",mins:t.mins||""}));
    if(!opsSlots.includes(slug)) opsSlots.push(slug);
    if(!labels[slug]) labels[slug] = sec.icon + " " + sec.key;
    if(!SLOT_META[slug]) SLOT_META[slug] = {label:sec.key, icon:sec.icon, cls:"slot-misc"};
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(opsRaw));
  localStorage.setItem(SLOTS_KEY,   JSON.stringify(opsSlots));
  localStorage.setItem(LABELS_KEY,  JSON.stringify(labels));
  localStorage.setItem(MIG,"1");
})();



/* ── live ops destinations for dynamic portals ── */
function liveOpsDests(excludeSlot){
  const slots  = JSON.parse(localStorage.getItem(SLOTS_KEY)||"null") || ["daily","weekly","monthly","systems","admin","misc"];
  const labels = loadLabels();
  return slots.filter(s=>s!==excludeSlot).map(s=>({slug:s, label:labels[s]||getMeta(s).label}));
}

/* ── cross-tab portal ── */
(function(){
  const el=document.createElement("div"); el.id="ops__xPortal";
  el.innerHTML='<div class="xp-title">Move task to\u2026</div><div id="ops__xPortalBody"></div>';
  document.body.appendChild(el);
})();

let _xState=null;
function openOpsXPortal(btn, getTask, onMoved, currentSlot){
  const portal=document.getElementById("ops__xPortal");
  const body=document.getElementById("ops__xPortalBody");
  body.innerHTML="";

  /* schedule */
  const sSec=document.createElement("div"); sSec.className="xp-section"; sSec.textContent="📅 Schedule";
  body.appendChild(sSec);
  [{dest:"today",label:"📅 Today (9 am block)"},{dest:"tomorrow",label:"🌅 Tomorrow (Pre-9 am)"}].forEach(item=>{
    const b=document.createElement("button"); b.className="xp-item"; b.textContent=item.label;
    b.onclick=()=>{
      const t={text:getTask().text,done:false,sub:getTask().sub||false,priority:getTask().priority||"none",mins:getTask().mins||""};
      if(item.dest==="today"){
        const r=JSON.parse(localStorage.getItem(TODAY_KEY))||{};
        if(!r["9-12"]) r["9-12"]=[];
        r["9-12"].unshift(t); localStorage.setItem(TODAY_KEY,JSON.stringify(r));
        onMoved("Today → 9 am block");
      } else {
        const r=JSON.parse(localStorage.getItem("TOMORROW_BLOCKS_V2"))||{};
        if(!r["pre-9"]) r["pre-9"]=[];
        r["pre-9"].unshift(t); localStorage.setItem("TOMORROW_BLOCKS_V2",JSON.stringify(r));
        onMoved("Tomorrow → Pre-9 am");
      }
      closeOpsXPortal();
    };
    body.appendChild(b);
  });

  /* ops blocks — live names */
  const dests=liveOpsDests(currentSlot);
  if(dests.length){
    const oSec=document.createElement("div"); oSec.className="xp-section"; oSec.textContent="⚙️ Operations";
    body.appendChild(oSec);
    dests.forEach(d=>{
      const b=document.createElement("button"); b.className="xp-item"; b.textContent="⚙️ "+d.label;
      b.onclick=()=>{
        const t={text:getTask().text,done:false,sub:getTask().sub||false,priority:getTask().priority||"none",mins:getTask().mins||""};
        const r=JSON.parse(localStorage.getItem(STORAGE_KEY))||{};
        if(!r[d.slug]) r[d.slug]=[];
        r[d.slug].unshift(t); localStorage.setItem(STORAGE_KEY,JSON.stringify(r));
        onMoved("Operations → "+d.label); closeOpsXPortal();
      };
      body.appendChild(b);
    });
  }

  const rect=btn.getBoundingClientRect();
  portal.style.visibility="hidden"; portal.classList.add("open");
  const ph=portal.offsetHeight||300;
  const top=(rect.bottom+6+ph>window.innerHeight)?Math.max(4,rect.top-ph-6):rect.bottom+6;
  portal.style.top=top+"px";
  portal.style.left=Math.min(Math.max(4,rect.left),window.innerWidth-250)+"px";
  portal.style.visibility=""; _xState=true;
}
function closeOpsXPortal(){document.getElementById("ops__xPortal").classList.remove("open");_xState=null;}
document.addEventListener("mousedown",e=>{
  if(!e.target.closest("#ops__xPortal")&&!e.target.closest(".xmove-btn")) closeOpsXPortal();
});

/* ── slot metadata ── */
let SLOTS = JSON.parse(localStorage.getItem(SLOTS_KEY)||"null") || ["daily","weekly","monthly","systems","admin","misc"];

/* ── default data ── */
const DEFAULT_DATA = {
  daily:   [{text:"Email zero",done:false,sub:false,priority:"high"},{text:"Review calendar",done:false,sub:false,priority:"mid"},{text:"Tidy workspace",done:false,sub:false,priority:"low"}],
  weekly:  [{text:"Weekly planning",done:false,sub:false,priority:"high"},{text:"Review expenses",done:false,sub:false,priority:"mid"}],
  monthly: [{text:"Account review",done:false,sub:false,priority:"mid"},{text:"Backup files",done:false,sub:false,priority:"low"}],
  systems: [{text:"Check automations",done:false,sub:false,priority:"mid"},{text:"Review alerts",done:false,sub:false,priority:"low"}],
  admin:   [{text:"File documents",done:false,sub:false,priority:"none"},{text:"Update records",done:false,sub:false,priority:"none"}],
  misc:    [],
};

const PRIORITY_CYCLE = ["none","low","mid","high"];
const PRIORITY_COLOR = {none:"#9e9891",low:"#4caf50",mid:"#ff9800",high:"#f44336"};

const html = document.documentElement;
const sysDark = ()=>window.matchMedia("(prefers-color-scheme: dark)").matches;
function resolveTheme(){ const o=localStorage.getItem(DARK_KEY); return o!==null?o==="1":sysDark(); }
let darkMode=resolveTheme();
html.dataset.theme=darkMode?"dark":"";
window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change",()=>{
  if(localStorage.getItem(DARK_KEY)===null){ darkMode=sysDark(); html.dataset.theme=darkMode?"dark":""; }
});

function normalize(items=[]){
  return items.map(t=>typeof t==="string"
    ?{text:t,done:false,sub:false,priority:"none",mins:""}
    :{text:t.text||"",done:!!t.done,sub:!!t.sub,priority:t.priority||"none",mins:t.mins||""});
}

let raw  = JSON.parse(localStorage.getItem(STORAGE_KEY)||"null");
let data = raw
  ? Object.fromEntries(SLOTS.map(s=>[s,normalize(raw[s]||[])]))
  : JSON.parse(JSON.stringify(DEFAULT_DATA));

/* pick up any extra slugs already in storage (migrated ones) */
if(raw){ Object.keys(raw).forEach(k=>{ if(!SLOTS.includes(k)){ SLOTS.push(k); data[k]=normalize(raw[k]||[]); } })
} else {
  /* try OT file-based storage */
  if(typeof OT!=="undefined") OT.onReady(()=>{
    Promise.all([OT.get(STORAGE_KEY),OT.get(SLOTS_KEY),OT.get(LABELS_KEY)]).then(([rawStr,slotsStr,labelsStr])=>{
      const otRaw=rawStr?JSON.parse(rawStr):null;
      if(otRaw){
        const otSlots=slotsStr?JSON.parse(slotsStr):["daily","weekly","monthly","systems","admin","misc"];
        SLOTS.length=0; otSlots.forEach(s=>SLOTS.push(s));
        Object.keys(otRaw).forEach(k=>{ if(!SLOTS.includes(k)) SLOTS.push(k); });
        SLOTS.forEach(s=>{ data[s]=normalize(otRaw[s]||[]); });
        if(labelsStr){ try{ const ll=JSON.parse(labelsStr); localStorage.setItem(LABELS_KEY,JSON.stringify(ll)); }catch(e){} }
        localStorage.setItem(STORAGE_KEY,JSON.stringify(otRaw));
        localStorage.setItem(SLOTS_KEY,JSON.stringify(otSlots));
        render();
      }
    });
  });
}

function save(){
  const ds=JSON.stringify(data); const ss=JSON.stringify(SLOTS);
  localStorage.setItem(STORAGE_KEY,ds); localStorage.setItem(SLOTS_KEY,ss);
  if(typeof OT!=="undefined"&&OT.isReady()){ OT.set(STORAGE_KEY,ds); OT.set(SLOTS_KEY,ss); }
  UndoManager.push('ops');
}
function cap(s){ return s?s.charAt(0).toUpperCase()+s.slice(1):s; }
/* register ops with undo manager */
UndoManager.register('ops',
  ()=>({data:JSON.parse(JSON.stringify(data)),slots:[...SLOTS]}),
  (snap)=>{
    SLOTS.length=0; snap.slots.forEach(s=>SLOTS.push(s));
    snap.slots.forEach(k=>{data[k]=snap.data[k]||[];});
    Object.keys(snap.data).forEach(k=>{if(!SLOTS.includes(k)){SLOTS.push(k);data[k]=snap.data[k];}});
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    localStorage.setItem(SLOTS_KEY,JSON.stringify(SLOTS));
    render();
  }
);

/* ── reset button ── */
document.getElementById("ops__resetBtn").onclick=()=>{
  if(!confirm("Reset all Operations to defaults? This will clear your custom tasks.")) return;
  data=JSON.parse(JSON.stringify(DEFAULT_DATA));
  SLOTS.length=0; ["daily","weekly","monthly","systems","admin","misc"].forEach(s=>SLOTS.push(s));
  save(); render();
};

/* ── toast ── */
function showToast(msg){
  const t=document.createElement("div"); t.textContent=msg;
  Object.assign(t.style,{position:"fixed",bottom:"70px",left:"50%",transform:"translateX(-50%)",
    background:darkMode?"#333":"#1a1714",color:"#fff",padding:"10px 20px",borderRadius:"40px",
    fontSize:"13px",zIndex:"9999",transition:"opacity 0.4s",fontFamily:"'DM Sans',sans-serif"});
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity="0";setTimeout(()=>t.remove(),400);},2200);
}

/* ── drag ── */
let dragState=null;
function getDropIndex(block,clientY){
  const rows=Array.from(block.querySelectorAll(".task:not(.dragging)"));
  for(let i=0;i<rows.length;i++){const r=rows[i].getBoundingClientRect();if(clientY<r.top+r.height/2)return i;}
  return rows.length;
}

/* ── stats ── */
function updateStats(){
  const all=SLOTS.flatMap(s=>data[s]||[]);
  const done=all.filter(t=>t.done).length;
  document.getElementById("ops__totalStats").textContent=all.length?`${done} / ${all.length} items checked`:"";
}

function sortDoneToBottom(arr){
  return [...arr.filter(t=>!t.done),...arr.filter(t=>t.done)];
}

/* ── render ── */
function render(){
  const grid=document.getElementById("ops__grid");
  grid.innerHTML="";
  const labels=loadLabels();

  SLOTS.forEach(slot=>{
    const meta        = getMeta(slot);
    const items       = data[slot]||[];
    const done        = items.filter(t=>t.done).length;
    const total       = items.length;
    const pct         = total?Math.round(done/total*100):0;
    const displayLabel= labels[slot]||meta.label;

    const block=document.createElement("div");
    block.className=`block ${meta.cls}`;
    block.dataset.slot=slot;

    block.innerHTML=`
      <div class="block-header">
        <div class="block-title"><input class="block-title-input" value="${displayLabel.replace(/"/g,'&quot;')}" title="Click to rename"></div>
        <div style="display:flex;align-items:center;gap:6px;">
          <button class="btn-all-toggle" title="Toggle all" style="font-size:11px;padding:2px 7px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;">${total>0&&done===total?'☑':'☐'} All</button>
          <div class="block-stats">${total?`${done}/${total}`:""}</div>
          <button class="block-del-btn" title="Delete block">✕</button>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="block-body"></div>
    `;

    block.querySelector(".block-title-input").oninput=e=>{
      const l=loadLabels(); l[slot]=e.target.value; saveLabels(l);
    };
    block.querySelector(".block-del-btn").onclick=()=>{
      if(items.length&&!confirm(`Delete "${displayLabel}" and all its tasks?`)) return;
      SLOTS.splice(SLOTS.indexOf(slot),1); delete data[slot];
      save(); render();
    };
    block.querySelector(".btn-all-toggle").onclick=()=>{
      const allDone=data[slot].every(t=>t.done);
      data[slot].forEach(t=>t.done=!allDone); save(); render();
    };

    const body=block.querySelector(".block-body");

    const nt=document.createElement("div"); nt.className="new-task";
    nt.innerHTML=`<input placeholder="Add item… (Enter to save)">`;
    nt.querySelector("input").onkeydown=e=>{
      if(e.key==="Enter"){
        const val=cap(e.target.value.trim()); if(!val) return;
        data[slot].unshift({text:val,done:false,sub:false,priority:"none",mins:""});
        save(); render();
        setTimeout(()=>block.querySelector(".new-task input")?.focus(),0);
      }
    };
    body.appendChild(nt);

    items.forEach((item,i)=>{
      const si=SLOTS.indexOf(slot);
      const row=document.createElement("div");
      row.className="task"+(item.done?" completed":"")+(item.sub?" subtask":"");
      row.innerHTML=`
        <span class="drag-handle">⠿</span>
        <input type="checkbox" class="task-cb" ${item.done?"checked":""}>
        <input type="text" class="task-text" value="${item.text.replace(/"/g,'&quot;')}">
        <button class="task-btn" title="Subtask">↳</button>
        <button class="task-btn" ${si===0?"disabled":""} title="Move left">‹</button>
        <button class="xmove-btn" title="Send to another tab">↗</button>
        <button class="task-btn" title="Remove">✕</button>
      `;

      const handle=row.querySelector(".drag-handle");
      const cb=row.querySelector(".task-cb");
      const tx=row.querySelector(".task-text");
      const [subBtn,leftBtn,delBtn]=row.querySelectorAll(".task-btn");
      const xmoveBtn=row.querySelector(".xmove-btn");

      handle.onpointerdown=()=>{row.draggable=true;};
      handle.onpointerup=()=>{if(!dragState)row.draggable=false;};
      tx.addEventListener("mousedown",e=>{ row.draggable=false; e.stopPropagation(); });
      // removed mouseleave — fires mid-drag and kills it
      row.addEventListener("dragstart",e=>{
        if(!row.draggable){e.preventDefault();return;}
        let group=[i];
        if(!item.sub){ for(let j=i+1;j<data[slot].length;j++){ if(!data[slot][j].sub) break; group.push(j); } }
        dragState={fromSlot:slot,fromIndex:i,groupSize:group.length};
        row.classList.add("dragging"); e.dataTransfer.effectAllowed="move"; e.dataTransfer.setData("text/plain","");
        group.slice(1).forEach(gi=>{ const r=body.querySelectorAll('.task')[gi]; if(r) r.classList.add('dragging'); });
      });
      row.addEventListener("dragend",()=>{ body.querySelectorAll('.task').forEach(r=>r.classList.remove("dragging")); row.draggable=false; dragState=null; });

      cb.onchange=()=>{
        item.done=cb.checked;
        // look up current index by reference — captured i is stale after any re-render/sort
        const ci=data[slot].indexOf(item);
        if(ci===-1){save();render();return;}
        // parent → cascade to following subtasks
        if(!item.sub){
          for(let j=ci+1;j<data[slot].length;j++){if(!data[slot][j].sub)break;data[slot][j].done=item.done;}
        }
        // subtask → update parent
        if(item.sub){
          let pi=-1;
          for(let j=ci-1;j>=0;j--){if(!data[slot][j].sub){pi=j;break;}}
          if(pi>=0){
            if(!item.done){data[slot][pi].done=false;}
            else{
              let allDone=true;
              for(let j=pi+1;j<data[slot].length;j++){if(!data[slot][j].sub)break;if(!data[slot][j].done){allDone=false;break;}}
              if(allDone) data[slot][pi].done=true;
            }
          }
        }
        data[slot]=sortDoneToBottom(data[slot]); save(); render();
      };
      tx.oninput=e=>{item.text=e.target.value;save();};
      tx.onkeydown=e=>{if(e.key==="Enter"){item.text=tx.value;save();tx.blur();}};
      subBtn.onclick=()=>{item.sub=!item.sub;save();render();};
      leftBtn.onclick=()=>{data[SLOTS[si-1]].push(data[slot].splice(i,1)[0]);save();render();};
      delBtn.onclick=()=>{data[slot].splice(i,1);save();render();};
      row.addEventListener("dblclick",e=>{
        if(e.target.matches("input,select,button")) return;
        const moved=data[slot].splice(i,1)[0]; data[slot].push(moved); save(); render();
        showToast("↓ Moved to bottom");
      });
      if(xmoveBtn) xmoveBtn.onclick=e=>{
        e.stopPropagation();
        openOpsXPortal(xmoveBtn,()=>({...item}),(lbl)=>{
          data[slot].splice(i,1); save(); render(); showToast("↗ Sent to "+lbl);
        }, slot);
      };

      body.appendChild(row);
    });

    block.addEventListener("dragover",e=>{
      if(!dragState)return; e.preventDefault();
      if(dragState.fromSlot!==slot) block.classList.add("ops-drop-target");
    });
    block.addEventListener("dragleave",e=>{
      if(!block.contains(e.relatedTarget)) block.classList.remove("ops-drop-target");
    });
    block.addEventListener("drop",e=>{
      if(!dragState)return; e.preventDefault();
      block.classList.remove("ops-drop-target");
      const{fromSlot,fromIndex,groupSize=1}=dragState;
      let ti=getDropIndex(block,e.clientY);
      const group=data[fromSlot].splice(fromIndex,groupSize);
      if(fromSlot===slot&&fromIndex<ti) ti=Math.max(0,ti-groupSize);
      data[slot].splice(ti,0,...group);
      save(); dragState=null; render();
    });

    if(items.some(t=>t.done)){
      const clr=document.createElement("button");
      clr.className="block-clear-done-btn"; clr.textContent="✓ Clear completed tasks";
      clr.onclick=()=>{data[slot]=data[slot].filter(t=>!t.done);save();render();};
      body.appendChild(clr);
    }

    grid.appendChild(block);
  });

  /* add block button */
  const addBtn=document.createElement("button");
  addBtn.className="add-block-btn";
  addBtn.innerHTML=`<span style="font-size:18px;">＋</span> Add block`;
  addBtn.onclick=()=>{
    const name=prompt("Block name:"); if(!name||!name.trim()) return;
    const slug="custom_"+Date.now();
    SLOTS.push(slug); data[slug]=[];
    const l=loadLabels(); l[slug]=name.trim(); saveLabels(l);
    if(!SLOT_META[slug]) SLOT_META[slug]={label:name.trim(),icon:"✦",cls:"slot-misc"};
    save(); render();
  };
  grid.appendChild(addBtn);
  updateStats();
}

(function(){
  var PIN='ONETRACK_NAV_PINNED';
  var nav=document.getElementById('onetrack-nav');
  var pin=document.getElementById('onetrack-pin');
  if(!nav) return;
  var pinned=localStorage.getItem(PIN)==='1';
  function apply(){
    if(pinned){ nav.classList.add('pinned'); document.body.classList.add('nav-pinned'); if(pin) pin.classList.add('pinned'); }
    else { nav.classList.remove('pinned'); document.body.classList.remove('nav-pinned'); if(pin) pin.classList.remove('pinned'); }
  }
  apply();
  if(pin) pin.addEventListener('click',function(e){
    e.stopPropagation(); pinned=!pinned;
    localStorage.setItem(PIN,pinned?'1':'0'); apply();
  });
})();

<script>
(function(){
  var el=document.getElementById('logoCheck');
  if(!el)return;
  var checked=false;
  function runCheck(){
    el.classList.remove('uncheck','is-checked');
    void el.offsetWidth;
    el.classList.add('animating');
    el.addEventListener('animationend',function done(e){
      if(e.animationName==='logoTickDraw'){
        el.removeEventListener('animationend',done);
        el.classList.remove('animating');
        el.classList.add('is-checked');
        checked=true;
      }
    });
  }
  function runUncheck(){
    el.classList.remove('animating','is-checked');
    void el.offsetWidth;
    el.classList.add('uncheck');
    el.addEventListener('animationend',function done(e){
      if(e.animationName==='logoBoxUnfill'){
        el.removeEventListener('animationend',done);
        el.classList.remove('uncheck');
        checked=false;
      }
    });
  }
  // Show green immediately, then wire click toggle
  el.classList.add('is-checked');
  checked = true;
  el.addEventListener('click',function(){
    if(checked){ runUncheck(); } else { runCheck(); }
  });
})();
</script>

<script>
/* ── Custom Calendar Picker ── */
(function(){
  var _openPicker = null;

  window.toggleCalPicker = function(pickerId, hiddenId, btn) {
    var picker = document.getElementById(pickerId);
    // If another picker is open, close it
    if (_openPicker && _openPicker !== picker) {
      _openPicker.style.display = 'none';
      _openPicker = null;
    }
    if (picker.style.display === 'none' || picker.style.display === '') {
      // Position below the button
      var rect = btn.getBoundingClientRect();
      picker.style.position = 'fixed';
      picker.style.top = (rect.bottom + 6) + 'px';
      picker.style.left = Math.min(rect.left, window.innerWidth - 280) + 'px';
      picker.style.display = 'block';
      _openPicker = picker;
      // Determine month to show: use stored value or today
      var hiddenEl = document.getElementById(hiddenId);
      var initDate = hiddenEl.value ? new Date(hiddenEl.value + 'T00:00:00') : new Date();
      renderCalPicker(picker, hiddenId, initDate.getFullYear(), initDate.getMonth());
    } else {
      picker.style.display = 'none';
      _openPicker = null;
    }
  };

  function renderCalPicker(picker, hiddenId, year, month) {
    var hiddenEl = document.getElementById(hiddenId);
    var selectedVal = hiddenEl.value; // "YYYY-MM-DD" or ""
    var today = new Date();
    var todayStr = today.getFullYear() + '-' + pad(today.getMonth()+1) + '-' + pad(today.getDate());

    var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    var dow = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

    picker.innerHTML = '';

    // Nav row
    var nav = document.createElement('div');
    nav.className = 'cp-nav';

    var prev = document.createElement('button');
    prev.className = 'cp-arrow'; prev.textContent = '‹';
    prev.onclick = function(e){ e.stopPropagation(); var nm = month - 1, ny = year; if(nm < 0){ nm = 11; ny--; } renderCalPicker(picker, hiddenId, ny, nm); };

    var lbl = document.createElement('span');
    lbl.className = 'cp-month-label';
    lbl.textContent = monthNames[month] + ' ' + year;

    var next = document.createElement('button');
    next.className = 'cp-arrow'; next.textContent = '›';
    next.onclick = function(e){ e.stopPropagation(); var nm = month + 1, ny = year; if(nm > 11){ nm = 0; ny++; } renderCalPicker(picker, hiddenId, ny, nm); };

    nav.appendChild(prev); nav.appendChild(lbl); nav.appendChild(next);
    picker.appendChild(nav);

    // Grid
    var grid = document.createElement('div');
    grid.className = 'cp-grid';

    // Day-of-week headers (Mon first)
    dow.forEach(function(d){
      var h = document.createElement('div');
      h.className = 'cp-dow'; h.textContent = d;
      grid.appendChild(h);
    });

    // First day of month — JS: 0=Sun,1=Mon...6=Sat
    // We want Mon=0 offset
    var first = new Date(year, month, 1).getDay(); // 0=Sun
    var offset = (first === 0) ? 6 : first - 1; // Mon-based offset

    var daysInMonth = new Date(year, month + 1, 0).getDate();

    // Empty cells before 1st
    for(var i = 0; i < offset; i++){
      var empty = document.createElement('div');
      empty.className = 'cp-day cp-empty';
      grid.appendChild(empty);
    }

    for(var d2 = 1; d2 <= daysInMonth; d2++){
      (function(day){
        var cell = document.createElement('div');
        cell.className = 'cp-day';
        cell.textContent = day;
        var dateStr = year + '-' + pad(month+1) + '-' + pad(day);
        if(dateStr === todayStr) cell.classList.add('cp-today');
        if(dateStr === selectedVal) cell.classList.add('cp-selected');
        cell.onclick = function(e){
          e.stopPropagation();
          hiddenEl.value = dateStr;
          // Update label on the button
          var btnSpan = picker.parentElement.querySelector('span[id$="calLabel"]');
          if(btnSpan){
            var parts = dateStr.split('-');
            btnSpan.textContent = pad(parseInt(parts[2])) + '/' + pad(parseInt(parts[1])) + '/' + parts[0];
          }
          picker.style.display = 'none';
          _openPicker = null;
          renderCalPicker(picker, hiddenId, year, month); // re-render to show selection
        };
        grid.appendChild(cell);
      })(d2);
    }

    picker.appendChild(grid);
  }

  function pad(n){ return n < 10 ? '0'+n : ''+n; }

  // Close on outside click
  document.addEventListener('mousedown', function(e){
    if(!_openPicker) return;
    if(!_openPicker.contains(e.target) && !e.target.closest('[onclick*="toggleCalPicker"]')){
      _openPicker.style.display = 'none';
      _openPicker = null;
    }
  });
})();
</script>

<script>
/* ── Task checkbox B (overshoot tick) ── */
(function(){
  function upgradeCb(cb){
    if(cb._cbUpgraded) return;
    cb._cbUpgraded = true;

    var svgWrap = document.createElement('span');
    svgWrap.className = 'task-cb-svg' + (cb.checked ? ' tcb-on' : '');
    svgWrap.innerHTML =
      '<svg width="18" height="18" viewBox="0 0 20 20" style="overflow:visible;">' +
        '<rect class="tcb-box" x="2" y="2" width="16" height="16" rx="4"/>' +
        '<path class="tcb-tick" d="M5 10 L8.5 13.5 L22 3"/>' +
      '</svg>';

    cb.parentNode.insertBefore(svgWrap, cb.nextSibling);

    svgWrap.addEventListener('click', function(e){
      e.stopPropagation();
      cb.checked = !cb.checked;
      var evt = new Event('change', {bubbles:true});
      cb.dispatchEvent(evt);
      if(cb.checked){
        svgWrap.classList.add('tcb-on');
      } else {
        svgWrap.classList.remove('tcb-on');
      }
    });

    cb.addEventListener('change', function(){
      if(cb.checked){ svgWrap.classList.add('tcb-on'); }
      else { svgWrap.classList.remove('tcb-on'); }
    });
  }

  function upgradeAll(){
    document.querySelectorAll('input.task-cb:not([data-upgraded])').forEach(function(cb){
      cb.setAttribute('data-upgraded','1');
      upgradeCb(cb);
    });
  }

  upgradeAll();

  var obs = new MutationObserver(function(muts){
    muts.forEach(function(m){
      m.addedNodes.forEach(function(n){
        if(n.nodeType!==1) return;
        if(n.matches && n.matches('input.task-cb')){ upgradeCb(n); n.setAttribute('data-upgraded','1'); }
        n.querySelectorAll && n.querySelectorAll('input.task-cb:not([data-upgraded])').forEach(function(cb){
          cb.setAttribute('data-upgraded','1');
          upgradeCb(cb);
        });
      });
    });
  });
  obs.observe(document.body, {childList:true, subtree:true});
})();
</script>

<script>
/* ── ONE-TIME LIMBO RECOVERY ── */
/* Tasks that were moved via moveToToday() before the fix landed
   got written to TODAY_BLOCKS_V2 in localStorage but the in-memory
   Today panel never picked them up. On the very next save() from
   Today it would have overwritten localStorage, discarding them.
   This script runs once on load: it detects that situation by
   checking a recovery flag, then re-merges any tasks that are
   currently in localStorage TODAY_BLOCKS_V2 into Today's live
   in-memory state so they render immediately — no data loss. */
(function(){
  var RECOVERY_FLAG = 'ONETRACK_LIMBO_RECOVERY_v1';
  if(localStorage.getItem(RECOVERY_FLAG)) return; // already ran
  localStorage.setItem(RECOVERY_FLAG, '1');

  // Wait for Today panel to finish initialising its _todaySyncAndRender
  function attempt(tries){
    if(typeof window._todaySyncAndRender === 'function'){
      // Simply re-sync Today's in-memory data from what's in localStorage.
      // If moveToToday() wrote tasks there and Today's save() hasn't
      // clobbered them yet, they'll now appear.
      window._todaySyncAndRender();
      console.log('['+OT.brand.name+'] Limbo recovery: Today panel re-synced from localStorage.');
    } else if(tries > 0){
      setTimeout(function(){ attempt(tries-1); }, 200);
    }
  }
  attempt(20);
})();
</script>

<script>
/* ── Nav collapse/expand ── */
(function(){
  var KEY = 'ONETRACK_NAV_COLLAPSED';
  var nav = document.getElementById('onetrack-nav');
  var btn = document.getElementById('nav-toggle-btn');
  var tab = document.getElementById('nav-show-tab');
  if (!nav) return;

  function isCollapsed() { return localStorage.getItem(KEY) === '1'; }

  function applyState(collapsed, animate) {
    if (!animate) { nav.style.transition = 'none'; }
    if (collapsed) {
      nav.classList.add('nav-collapsed');
      document.body.classList.add('nav-is-collapsed');
      if (btn) btn.textContent = '›';
      if (btn) btn.title = 'Show sidebar';
    } else {
      nav.classList.remove('nav-collapsed');
      document.body.classList.remove('nav-is-collapsed');
      if (btn) btn.textContent = '‹';
      if (btn) btn.title = 'Hide sidebar';
    }
    if (!animate) {
      // Force reflow then restore transition
      void nav.offsetWidth;
      nav.style.transition = '';
    }
  }

  // Apply on load (no animation)
  applyState(isCollapsed(), false);

  // Toggle button in nav header
  if (btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var next = !isCollapsed();
      localStorage.setItem(KEY, next ? '1' : '0');
      applyState(next, true);
    });
  }

  // Floating show-tab click
  if (tab) {
    tab.addEventListener('click', function() {
      localStorage.setItem(KEY, '0');
      applyState(false, true);
    });
  }
})();
</script>
