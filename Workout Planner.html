/* ===== GLOBAL LAYOUT CSS ===== */
:root {
  --nav-width: 200px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 16px;
  --radius-sm: 4px;
  --radius-md: 8px;
}
[data-theme="dark"] {
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'DM Sans', sans-serif; }
.topbar { position:fixed; top:0; left:var(--nav-width); right:0; height:48px; z-index:2000; }
.panels { position:fixed; top:48px; left:var(--nav-width); right:0; bottom:48px; overflow:hidden; }
.panel  { position:absolute; inset:0; opacity:0; pointer-events:none; overflow-y:auto; transition:opacity 0.15s; }
.panel.active { opacity:1; pointer-events:all; }
.panel .main  { margin-left:0 !important; padding-top:24px !important; }
.panel .footer-actions { left:0 !important; }
.footer-actions { position:fixed; bottom:0; left:var(--nav-width); right:0; background:var(--surface); border-top:2px solid var(--accent); padding:12px 28px; display:flex; align-items:center; gap:10px; z-index:200; box-shadow: 0 -2px 12px rgba(0,0,0,0.15); }
.footer-actions .spacer { flex:1; }
.build-stamp { font-size:10px; color:var(--text3); letter-spacing:0.06em; font-family:'DM Sans',sans-serif; white-space:nowrap; opacity:0.75; font-style:italic; }
@media(max-width:700px){ :root{ --nav-width:0px; } .nav{ display:none; } }

/* ===== TOPBAR ===== */
.topbar {
  background: var(--surface, #fff);
  border-bottom: 1px solid var(--border, rgba(0,0,0,0.08));
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  box-shadow: 0 1px 8px rgba(0,0,0,0.05);
}
.topbar-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 15px;
  color: var(--accent, #1d4fd6);
  white-space: nowrap;
  flex-shrink: 0;
}
.tab-strip {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tab-strip::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  background: none;
  color: var(--text2, #5c5a60);
  flex-shrink: 0;
}
.tab-btn:hover { background: var(--surface2, #f8f7f5); color: var(--text, #16151a); }
.tab-btn.active {
  background: var(--accent-soft, rgba(29,79,214,0.12));
  color: var(--accent, #1d4fd6);
  font-weight: 600;
  border-color: rgba(193,123,63,0.25);
}
.tab-btn.dragging { opacity: 0.4; }
.topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
/* Dark toggle removed — theme controlled by Settings tab */

/* ===== exer CSS ===== */
#panel-exer {
  --shadow: 0 2px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-hover: 0 8px 28px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);

}

/* ── NAV LOGO CHECKBOX ── */
.logo-check{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;overflow:visible;}
.logo-check svg{overflow:visible;display:block;}
.logo-box{fill:none;stroke:var(--accent);stroke-width:1.5;transition:fill 0.25s,stroke 0.25s;}
.logo-tick{fill:none;stroke:var(--accent);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:28;stroke-dashoffset:28;transition:stroke 0.15s;}
.logo-check.is-checked .logo-box{fill:#3a8c5c;stroke:#3a8c5c;}

.logo-check.uncheck .logo-box{animation:logoBoxUnfill 0.25s ease forwards;}
.logo-check.uncheck .logo-tick{animation:logoTickErase 0.2s ease forwards;}
@keyframes logoBoxFill{0%{fill:none;stroke:var(--accent);}100%{fill:#3a8c5c;stroke:#3a8c5c;}}
@keyframes logoTickDraw{from{stroke-dashoffset:28;}to{stroke-dashoffset:0;}}
@keyframes logoBoxUnfill{0%{fill:#3a8c5c;stroke:#3a8c5c;}100%{fill:none;stroke:var(--accent);}}

<script>
/* ═══════════════════════════════════════════════════════════════
   GLOBAL UNDO / REDO MANAGER  (Ctrl+Z / Ctrl+Y / Ctrl+Shift+Z)
═══════════════════════════════════════════════════════════════ */
const UndoManager=(function(){
  const TABS={},MAX=50;
  function register(tabId,getSnapshot,applySnapshot){
    TABS[tabId]={stack:[],cursor:-1,get:getSnapshot,apply:applySnapshot};
    push(tabId);
  }
  function push(tabId){
    const t=TABS[tabId];if(!t)return;
    const snap=JSON.stringify(t.get());
    t.stack=t.stack.slice(0,t.cursor+1);
    if(t.stack.length&&t.stack[t.cursor]===snap)return;
    t.stack.push(snap);
    if(t.stack.length>MAX)t.stack.shift();
    t.cursor=t.stack.length-1;
  }
  function undo(tabId){
    const t=TABS[tabId];if(!t||t.cursor<=0)return false;
    t.cursor--;t.apply(JSON.parse(t.stack[t.cursor]));return true;
  }
  function redo(tabId){
    const t=TABS[tabId];if(!t||t.cursor>=t.stack.length-1)return false;
    t.cursor++;t.apply(JSON.parse(t.stack[t.cursor]));return true;
  }
  function toastMsg(msg){
    const el=document.createElement('div');el.textContent=msg;
    Object.assign(el.style,{position:'fixed',bottom:'70px',left:'50%',transform:'translateX(-50%)',
      background:'#1a1714',color:'#fff',padding:'8px 18px',borderRadius:'40px',
      fontSize:'12px',zIndex:'99999',opacity:'1',transition:'opacity 0.4s',
      fontFamily:"'DM Sans',sans-serif",pointerEvents:'none'});
    document.body.appendChild(el);
    setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),400);},1600);
  }
  document.addEventListener('keydown',function(e){
    if(document.activeElement&&['INPUT','TEXTAREA'].includes(document.activeElement.tagName))return;
    const active=window._activeWeeklyTab||'meal';
    if((e.ctrlKey||e.metaKey)&&!e.altKey){
      if((e.key==='z'||e.key==='Z')&&e.shiftKey){if(redo(active)){e.preventDefault();toastMsg('↷ Redo');}}
      else if(e.key==='z'||e.key==='Z'){if(undo(active)){e.preventDefault();toastMsg('↺ Undo');}}
      else if(e.key==='y'||e.key==='Y'){if(redo(active)){e.preventDefault();toastMsg('↷ Redo');}}
    }
  });
  return{register,push,undo,redo};
})();

/* ═══════════════════════════════════════════════════════════════
   SHARED PRINT HELPER
═══════════════════════════════════════════════════════════════ */
function buildPrintDoc(title, subtitle, bodyHTML, landscape){
  const now=new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const pageSize = landscape ? 'A4 landscape' : 'A4';
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',Georgia,sans-serif;color:#111;background:#fff;padding:20px 24px;}
    @page{size:${pageSize};margin:10mm;}
    @media print{body{padding:0;}-webkit-print-color-adjust:exact;print-color-adjust:exact;}

<!-- ===== EXERCISE PLAN JS ===== -->
<script>
(function(){

const DARK_KEY    = "TODAY_DARK";
const STORAGE_KEY = "EXERCISE_PLAN_V1";

const EXERCISES = ["Upper Body","Lower Body","Core Strength","Running","Swimming"];
const DAYS      = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

function getMonday(d) {
  const date = new Date(d);
  const day  = date.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  date.setDate(date.getDate() + diff);
  date.setHours(0,0,0,0);
  return date;
}
function weekKey(monday) {
  return monday.toISOString().split("T")[0];
}

let currentMonday = getMonday(new Date());

function loadAll()  { return JSON.parse(_cget(STORAGE_KEY) || "{}"); }
function saveAll(d) { _cset(STORAGE_KEY, JSON.stringify(d)); }
function loadWeek() {
  const all = loadAll();
  return all[weekKey(currentMonday)] || {};
}
function saveWeek(data) {
  const all = loadAll();
  all[weekKey(currentMonday)] = data;
  saveAll(all);
  UndoManager.push('exer');
}

/* Register exercise with UndoManager */
UndoManager.register('exer',
  ()=>({data:JSON.parse(_cget(STORAGE_KEY)||'{}')}),
  (snap)=>{
    _cset(STORAGE_KEY,JSON.stringify(snap.data));
    exer_renderTable();
  }
);
function getChecked(ex, day) {
  return !!(loadWeek()[ex + "_" + day]);
}
function setChecked(ex, day, val) {
  const d = loadWeek();
  d[ex + "_" + day] = val;
  saveWeek(d);
}

function updateWeekLabel() {
  const end = new Date(currentMonday);
  end.setDate(end.getDate() + 6);
  const fmt = d => d.toLocaleDateString("en-AU", {day:"2-digit", month:"short"});
  document.getElementById("exer__weekLabel").textContent =
    fmt(currentMonday) + " – " + fmt(end) + " " + currentMonday.getFullYear();
  const exp = document.getElementById("exer__exportDate");
  if (exp) exp.value = weekKey(currentMonday);
}

function exer_changeWeek(offset) {
  currentMonday.setDate(currentMonday.getDate() + 7 * offset);
  exer_renderTable();
}
window.exer_changeWeek = exer_changeWeek;

function exer_renderTable() {
  updateWeekLabel();
  // Update column headers with day + date
  const thead = document.getElementById("exer__thead");
  if (thead) {
    let html = '<tr><th>Exercise</th>';
    DAYS.forEach((day, i) => {
      const d = new Date(currentMonday);
      d.setDate(d.getDate() + i);
      const dateStr = d.toLocaleDateString("en-AU", {day:"numeric", month:"short"});
      html += `<th>${day}<br><span style="font-size:10px;font-weight:400;opacity:0.6;">${dateStr}</span></th>`;
    });
    html += '</tr>';
    thead.innerHTML = html;
  }
  const tbody = document.querySelector("#exer__exerciseTable tbody");
  tbody.innerHTML = "";
  EXERCISES.forEach(ex => {
    const tr = document.createElement("tr");
    const td0 = document.createElement("td");
    td0.className = "exercise-col";
    td0.textContent = ex;
    tr.appendChild(td0);
    DAYS.forEach(day => {
      const td = document.createElement("td");
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = getChecked(ex, day);
      cb.onchange = () => { setChecked(ex, day, cb.checked); };
      td.appendChild(cb);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function exer_clearAll() {
  if (!confirm("Clear all exercise checks for this week?")) return;
  saveWeek({});
  exer_renderTable();
}
window.exer_clearAll = exer_clearAll;

function exer_downloadCalendarICS() {
  const expEl = document.getElementById("exer__exportDate");
  const val   = expEl ? expEl.value : "";
  const base  = val ? getMonday(new Date(val)) : currentMonday;
  function fmt(dt) { return dt.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z"; }
  let ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Weekly Exercise Plan//EN\nCALSCALE:GREGORIAN\n";
  const data = loadAll()[weekKey(base)] || {};
  DAYS.forEach((day, di) => {
    const date = new Date(base);
    date.setDate(base.getDate() + di);
    EXERCISES.forEach((ex, ei) => {
      if (!data[ex + "_" + day]) return;
      const start = new Date(date); start.setHours(7 + ei, 0, 0);
      const end   = new Date(date); end.setHours(7 + ei, 45, 0);
      ics += "BEGIN:VEVENT\nSUMMARY:" + ex + "\nDTSTART:" + fmt(start) + "\nDTEND:" + fmt(end) + "\nEND:VEVENT\n";
    });
  });
  ics += "END:VCALENDAR";
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([ics], {type:"text/calendar"}));
  a.download = "Weekly_Exercise_" + weekKey(base) + ".ics";
  a.click();
}
window.exer_downloadCalendarICS = exer_downloadCalendarICS;

function exer_printBW() {
  const data = loadWeek();
  const end  = new Date(currentMonday); end.setDate(end.getDate()+6);
  const fmt  = d => d.toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"});
  const weekLabel = fmt(currentMonday) + " – " + fmt(end);

  let rowsHTML = "";
  EXERCISES.forEach(ex => {
    rowsHTML += `<tr><td style="padding:8px 12px;border:1px solid #ccc;text-align:left;font-weight:600;font-size:12px;">${ex}</td>`;
    DAYS.forEach(day => {
      const checked = !!(data[ex+"_"+day]);
      const box = checked
        ? `<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border:1.5px solid #333;border-radius:3px;background:#333;"><span style="color:#fff;font-size:11px;">✓</span></span>`
        : `<span style="display:inline-block;width:16px;height:16px;border:1.5px solid #999;border-radius:3px;"></span>`;
      rowsHTML += `<td style="padding:8px;border:1px solid #ccc;text-align:center;">${box}</td>`;
    });
    rowsHTML += `</tr>`;
  });

  const bodyHTML = `<table style="width:100%;border-collapse:collapse;">
    <thead><tr style="background:#f7f7f7;">
      <th style="padding:8px 12px;border:1px solid #ccc;text-align:left;font-size:12px;">Exercise</th>
      ${DAYS.map(d=>`<th style="padding:8px;border:1px solid #ccc;font-size:12px;">${d}</th>`).join("")}
    </tr></thead>
    <tbody>${rowsHTML}</tbody>
  </table>`;

  openPrint(buildPrintDoc('Weekly Exercise Plan', weekLabel, bodyHTML, true));
}
window.exer_printBW = exer_printBW;

function exer_printColor() {
  const data = loadWeek();
  const end  = new Date(currentMonday); end.setDate(end.getDate()+6);
  const fmt  = d => d.toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"});
  const weekLabel = fmt(currentMonday) + " – " + fmt(end);
  const PALETTES = [
    {bg:"#eef8ee",hdr:"#d8eed8",accent:"#2e7a2e",border:"#b0d8b0"},
    {bg:"#eef2fc",hdr:"#d4dff5",accent:"#2a4ea0",border:"#a8bce8"},
    {bg:"#fdf5e0",hdr:"#f5e4b8",accent:"#9a6a10",border:"#e0c880"},
    {bg:"#fde6dc",hdr:"#f8d4c4",accent:"#b04a30",border:"#e8b8a8"},
    {bg:"#ede8f5",hdr:"#ddd4ee",accent:"#6a4a9a",border:"#c8b8e2"},
  ];
  const DAY_COLORS = ["#f5e8d8","#fdf3e0","#fde8cc","#fdddd0","#e0e8f5","#ede8f5","#e8f0e8"];

  let rowsHTML = "";
  EXERCISES.forEach((ex,ei) => {
    const pal = PALETTES[ei % PALETTES.length];
    rowsHTML += `<tr><td style="padding:8px 12px;border:1.5px solid ${pal.border};background:${pal.hdr};font-family:'DM Serif Display',Georgia,serif;font-size:13px;color:${pal.accent};font-weight:600;text-align:left;">${ex}</td>`;
    DAYS.forEach(day => {
      const checked = !!(data[ex+"_"+day]);
      const box = checked
        ? `<span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border:1.5px solid ${pal.accent};border-radius:3px;background:${pal.accent};"><span style="color:#fff;font-size:12px;">✓</span></span>`
        : `<span style="display:inline-block;width:18px;height:18px;border:1.5px solid ${pal.border};border-radius:3px;background:#fff;"></span>`;
      rowsHTML += `<td style="padding:8px;border:1.5px solid ${pal.border};background:${pal.bg};text-align:center;">${box}</td>`;
    });
    rowsHTML += `</tr>`;
  });

  const bodyHTML = `<table style="width:100%;border-collapse:collapse;">
    <thead><tr>
      <th style="background:#f0ece6;border:1.5px solid #d8ccbc;padding:8px 12px;font-family:'DM Serif Display',Georgia,serif;font-size:12px;color:#7a6a56;text-align:left;">Exercise</th>
      ${DAYS.map((d,i)=>`<th style="background:${DAY_COLORS[i]};border:1.5px solid #d8ccbc;padding:8px;font-family:'DM Serif Display',Georgia,serif;font-size:12px;color:#3a2e20;">${d}</th>`).join("")}
    </tr></thead>
    <tbody>${rowsHTML}</tbody>
  </table>`;

  openPrint(buildPrintDoc('Weekly Exercise Plan', weekLabel, bodyHTML, true));
}
window.exer_printColor = exer_printColor;

/* ── Boot ── */
OT.onReady(async () => {
  if(!Object.keys(_otCache).length) _otCache = await OT.getAll();
  exer_renderTable();
});

})();
</script>


<script>
(function(){
  var el=document.getElementById("logoCheck");
  if(!el)return;
  var checked=false;
  function runCheck(){
    el.classList.remove("uncheck","is-checked");
    void el.offsetWidth;
    el.classList.add("animating");
    el.addEventListener("animationend",function done(e){
      if(e.animationName==="logoTickDraw"){
        el.removeEventListener("animationend",done);
        el.classList.remove("animating");
        el.classList.add("is-checked");
        checked=true;
      }
    });
  }
  function runUncheck(){
    el.classList.remove("animating","is-checked");
    void el.offsetWidth;
    el.classList.add("uncheck");
    el.addEventListener("animationend",function done(e){
      if(e.animationName==="logoBoxUnfill"){
        el.removeEventListener("animationend",done);
        el.classList.remove("uncheck");
        checked=false;
      }
    });
  }
  setTimeout(runCheck,500);
  el.addEventListener("click",function(){ if(checked){runUncheck();}else{runCheck();} });
})();
</script>


<script>
/* ── Task checkbox B (overshoot tick) ── */
(function(){
  function upgradeCb(cb){
    if(cb._cbUpgraded) return;
    cb._cbUpgraded = true;
    var svgWrap = document.createElement('span');
    svgWrap.className = 'task-cb-svg' + (cb.checked ? ' tcb-on' : '');
    svgWrap.innerHTML =
      '<svg width="18" height="18" viewBox="0 0 20 20" style="overflow:visible;">' +
        '<rect class="tcb-box" x="2" y="2" width="16" height="16" rx="4"/>' +
        '<path class="tcb-tick" d="M5 10 L8.5 13.5 L22 3"/>' +
      '</svg>';
    cb.parentNode.insertBefore(svgWrap, cb.nextSibling);
    svgWrap.addEventListener('click', function(e){
      e.stopPropagation();
      cb.checked = !cb.checked;
      var evt = new Event('change', {bubbles:true});
      cb.dispatchEvent(evt);
      svgWrap.classList.toggle('tcb-on', cb.checked);
    });
    cb.addEventListener('change', function(){
      svgWrap.classList.toggle('tcb-on', cb.checked);
    });
  }
  function upgradeAll(){
    document.querySelectorAll('#panel-exer input[type=checkbox]:not([data-tcb])').forEach(function(cb){
      cb.setAttribute('data-tcb','1'); upgradeCb(cb);
    });
  }
  upgradeAll();
  var obs = new MutationObserver(function(muts){
    muts.forEach(function(m){
      m.addedNodes.forEach(function(n){
        if(n.nodeType!==1) return;
        if(n.matches && n.matches('#panel-exer input[type=checkbox]')){ upgradeCb(n); n.setAttribute('data-tcb','1'); }
        if(n.querySelectorAll) n.querySelectorAll('#panel-exer input[type=checkbox]:not([data-tcb])').forEach(function(cb){
          cb.setAttribute('data-tcb','1'); upgradeCb(cb);
        });
      });
    });
  });
  obs.observe(document.body, {childList:true, subtree:true});
})();
</script>

<script>
/* ── Nav collapse/expand ── */
(function(){
  var KEY = 'ONETRACK_NAV_COLLAPSED';
  var nav = document.getElementById('onetrack-nav');
  var btn = document.getElementById('nav-toggle-btn');
  var tab = document.getElementById('nav-show-tab');
  if (!nav) return;

  function isCollapsed() { return _cget('ONETRACK_NAV_COLLAPSED') === '1'; }

  function applyState(collapsed, animate) {
    if (!animate) { nav.style.transition = 'none'; }
    if (collapsed) {
      nav.classList.add('nav-collapsed');
      document.body.classList.add('nav-is-collapsed');
      if (btn) btn.textContent = '›';
      if (btn) btn.title = 'Show sidebar';
    } else {
      nav.classList.remove('nav-collapsed');
      document.body.classList.remove('nav-is-collapsed');
      if (btn) btn.textContent = '‹';
      if (btn) btn.title = 'Hide sidebar';
    }
    if (!animate) {
      // Force reflow then restore transition
      void nav.offsetWidth;
      nav.style.transition = '';
    }
  }

  // Apply on load (no animation)
  applyState(isCollapsed(), false);

  // Toggle button in nav header
  if (btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var next = !isCollapsed();
      _cset('ONETRACK_NAV_COLLAPSED', next ? '1' : '0');
      applyState(next, true);
    });
  }

  // Floating show-tab click
  if (tab) {
    tab.addEventListener('click', function() {
      _cset('ONETRACK_NAV_COLLAPSED', '0');
      applyState(false, true);
    });
  }
})();
</script>
