<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%233a8c5c'/%3E%3Cpath d='M7 16.5l6 6 12-12' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
<title data-page="Workout Planner">Workout Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="storage.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
<style>

/* ===== GLOBAL LAYOUT CSS ===== */
:root {
  --nav-width: 200px;
  --tab-width: 140px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 16px;
  --radius-sm: 4px;
  --radius-md: 8px;
}
[data-theme="dark"] {
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'DM Sans', sans-serif; }
.topbar { position:fixed; top:0; left:var(--nav-width); right:0; height:48px; z-index:2000; }
.panels { position:fixed; top:48px; left:var(--nav-width); right:0; bottom:0; display:flex; overflow:hidden; }
.panel { position:absolute; inset:0; opacity:0; pointer-events:none; overflow-y:auto; transition:opacity 0.15s; }
.panel.active { opacity:1; pointer-events:all; }

/* ===== MAIN NAV (left sidebar) ===== */
.nav {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: var(--nav-width);
  background: #ffffff;
  border-right: 1px solid rgba(0,0,0,0.08);
  display: flex; flex-direction: column;
  padding: 24px 0; z-index: 100;
  box-shadow: 2px 0 16px rgba(0,0,0,0.04);
  transition: background 0.3s;
}
[data-theme="dark"] .nav { background: #18181d; border-right-color: rgba(255,255,255,0.08); }

.nav a {
  display: block; padding: 8px 20px;
  font-size: 13px; color: #5c5a60;
  text-decoration: none; transition: all 0.15s;
  border-left: 3px solid transparent;
}
[data-theme="dark"] .nav a { color: #a3a1a8; }
.nav a:hover { color: #16151a; background: #f8f7f5; transform: translateX(4px); }
[data-theme="dark"] .nav a:hover { color: #ededf0; background: #1f1f26; transform: translateX(4px); }
.nav a.active { color: #1d4fd6; font-weight: 600; border-left-color: #1d4fd6; background: rgba(29,79,214,0.12); }
[data-theme="dark"] .nav a.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-soft); }

.nav-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px 14px; border-bottom: 1px solid var(--border);
  margin-bottom: 10px; gap: 6px;
}
.nav-header .nav-title {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  color: var(--accent);
  padding: 0;
  border-bottom: none;
  margin-bottom: 0;
}

.logo-check{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;overflow:visible;}
.logo-check svg{overflow:visible;display:block;}
.logo-box{fill:none;stroke:var(--accent);stroke-width:1.5;transition:fill 0.25s,stroke 0.25s;}
.logo-tick{fill:none;stroke:var(--accent);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:28;stroke-dashoffset:28;transition:stroke 0.15s;}
.logo-check.is-checked .logo-box{fill:#3a8c5c;stroke:#3a8c5c;}
.logo-check.is-checked .logo-tick{stroke:#fff;stroke-dashoffset:0;}
.logo-check.animating .logo-box{animation:logoBoxFill 0.3s ease forwards 0.1s;}
.logo-check.animating .logo-tick{stroke:#fff;animation:logoTickDraw 0.35s cubic-bezier(.2,0,.1,1) forwards 0.12s;}
.logo-check.uncheck .logo-box{animation:logoBoxUnfill 0.25s ease forwards;}
.logo-check.uncheck .logo-tick{animation:logoTickErase 0.2s ease forwards;}
@keyframes logoBoxFill{0%{fill:none;stroke:var(--accent);}100%{fill:#3a8c5c;stroke:#3a8c5c;}}
@keyframes logoTickDraw{from{stroke-dashoffset:28;}to{stroke-dashoffset:0;}}
@keyframes logoBoxUnfill{0%{fill:#3a8c5c;stroke:#3a8c5c;}100%{fill:none;stroke:var(--accent);}}
@keyframes logoTickErase{from{stroke-dashoffset:0;}to{stroke-dashoffset:28;}}

.nav-toggle-btn {
  display: flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface2); color: var(--text3);
  cursor: pointer; font-size: 13px; line-height: 1;
  flex-shrink: 0; transition: background 0.15s, color 0.15s, border-color 0.15s;
  user-select: none;
}
.nav-toggle-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

.nav.nav-collapsed {
  width: 0 !important;
  padding: 0 !important;
  overflow: hidden !important;
  border-right: none !important;
  box-shadow: none !important;
}

body.nav-is-collapsed .topbar { left: 0 !important; }
body.nav-is-collapsed .panels { left: 0 !important; }

#nav-show-tab {
  display: none;
  position: fixed; top: 50%; left: 0;
  transform: translateY(-50%);
  z-index: 9999;
  writing-mode: vertical-lr;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: none;
  border-radius: 0 8px 8px 0;
  padding: 12px 6px;
  font-size: 11px; font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  letter-spacing: 0.05em;
}

body.nav-is-collapsed #nav-show-tab { display: block; }

/* ===== TOPBAR ===== */
.topbar {
  background: var(--surface, #fff);
  border-bottom: 1px solid var(--border, rgba(0,0,0,0.08));
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  box-shadow: 0 1px 8px rgba(0,0,0,0.05);
}
.topbar-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 15px;
  color: var(--accent, #1d4fd6);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ===== SIDE TAB BAR (left of content) ===== */
.tab-sidebar {
  width: var(--tab-width);
  background: var(--surface2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 12px 0;
}

.tab-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 8px;
  margin: 4px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  background: var(--surface);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
  gap: 4px;
}

.tab-item:hover {
  background: var(--surface);
  border-color: var(--text2);
}

.tab-item.active {
  color: var(--accent);
  background: var(--accent-soft);
  border-color: var(--accent);
  font-weight: 600;
}

.tab-drag-handle {
  cursor: grab;
  color: var(--text2);
  font-size: 14px;
  user-select: none;
  flex-shrink: 0;
  display: flex;
  align-items: center;
}

.tab-drag-handle:active {
  cursor: grabbing;
}

.tab-item-label {
  flex: 1;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 3px;
  text-align: left;
}

.tab-item-label:hover {
  background: rgba(0,0,0,0.05);
}

[data-theme="dark"] .tab-item-label:hover {
  background: rgba(255,255,255,0.05);
}

.tab-item-delete {
  width: 18px;
  height: 18px;
  border: none;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}

.tab-item-delete:hover {
  color: #E24B4A;
  background: rgba(226, 75, 74, 0.1);
}

.add-tab-btn {
  margin: 12px;
  padding: 8px;
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--text2);
  border-radius: 6px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 500;
  transition: all 0.2s;
}

.add-tab-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ===== MAIN CONTENT ===== */
.content-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.main { 
  padding: 24px; 
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.main-content-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
  align-content: start;
}

.page-title {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  font-weight: 400;
  margin-bottom: 24px;
  color: var(--text);
}

/* ===== MUSCLE GROUP ===== */
.muscle-group {
  margin-bottom: 20px;
  padding: 14px;
  background: var(--surface2);
  border-radius: 8px;
  border-left: 3px solid var(--accent);
  cursor: grab;
  transition: all 0.2s;
}

.muscle-group:active {
  cursor: grabbing;
}

.muscle-group.dragging {
  opacity: 0.6;
  transform: scale(0.98);
}

.muscle-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}

.muscle-drag-handle {
  cursor: grab;
  color: var(--text2);
  font-size: 14px;
  user-select: none;
  flex-shrink: 0;
}

.muscle-name {
  font-size: 11px;
  color: var(--text2);
  font-style: italic;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  flex: 1;
  cursor: text;
  padding: 4px 6px;
  border-radius: 3px;
  border: 1px solid transparent;
  user-select: none;
}

.muscle-name:hover {
  background: rgba(0,0,0,0.05);
}

[data-theme="dark"] .muscle-name:hover {
  background: rgba(255,255,255,0.05);
}

.muscle-delete-btn {
  width: 24px;
  height: 24px;
  border: none;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  border-radius: 4px;
  font-size: 12px;
  flex-shrink: 0;
}

.muscle-delete-btn:hover {
  color: #E24B4A;
  background: rgba(226, 75, 74, 0.1);
}

/* ===== EXERCISE ROW ===== */
.exercise-row {
  display: grid;
  grid-template-columns: 20px 1fr 80px 80px 100px 60px 40px;
  gap: 10px;
  align-items: center;
  padding: 12px;
  margin-bottom: 8px;
  background: var(--surface);
  border-radius: 6px;
  border: 1px solid var(--border);
  font-size: 12px;
  transition: all 0.2s;
}

.exercise-row:hover {
  background: var(--surface2);
  border-color: var(--text2);
}

.drag-handle {
  cursor: grab;
  color: var(--text2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  user-select: none;
}

.drag-handle:active { cursor: grabbing; }

.exercise-name {
  font-weight: 500;
  color: var(--text);
  cursor: text;
  padding: 4px;
  border-radius: 3px;
  border: 1px solid transparent;
  user-select: none;
}

.exercise-name:hover {
  background: rgba(0,0,0,0.05);
}

[data-theme="dark"] .exercise-name:hover {
  background: rgba(255,255,255,0.05);
}

.editable-input {
  padding: 6px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text);
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  font-family: 'DM Sans', sans-serif;
}

.editable-input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--surface);
}

.date-input {
  padding: 6px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text);
  font-size: 11px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}

.checkbox-wrapper input {
  width: 16px;
  height: 16px;
  cursor: pointer;
}

.action-btn {
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.action-btn:hover {
  color: var(--text);
  border-color: var(--text2);
}

.action-btn.delete:hover {
  color: #E24B4A;
  border-color: #E24B4A;
}

.add-exercise-btn {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--text2);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.add-exercise-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.add-muscle-btn {
  width: 100%;
  padding: 10px;
  margin-top: 12px;
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--text2);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.add-muscle-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ===== FOOTER ACTIONS ===== */
.tab-footer {
  display: flex;
  gap: 8px;
  padding: 12px;
  background: var(--surface2);
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}

.btn {
  padding: 8px 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.btn:hover {
  border-color: var(--text);
}

.btn-accent {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.btn-accent:hover {
  opacity: 0.9;
}

/* ===== LOG BOOK ===== */
.log-header {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.log-entry {
  margin-bottom: 16px;
  padding: 14px;
  background: var(--surface2);
  border-radius: 8px;
  border-left: 3px solid var(--accent);
}

.log-entry-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.log-date {
  font-weight: 600;
  color: var(--text);
  font-size: 13px;
}

.log-actions {
  display: flex;
  gap: 6px;
}

.log-exercise {
  display: grid;
  grid-template-columns: 1fr 60px 60px 40px;
  gap: 8px;
  align-items: center;
  padding: 8px;
  background: var(--surface);
  border-radius: 4px;
  margin-bottom: 6px;
  font-size: 12px;
  border: 1px solid var(--border);
}

.log-exercise-name {
  cursor: text;
  color: var(--text);
  font-weight: 500;
}

.log-input {
  padding: 4px 6px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--surface2);
  color: var(--text);
  font-size: 12px;
  text-align: center;
  font-family: 'DM Sans', sans-serif;
}

.log-input:focus {
  outline: none;
  border-color: var(--accent);
}

.log-delete-btn {
  width: 24px;
  height: 24px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  border-radius: 3px;
  cursor: pointer;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.log-delete-btn:hover {
  color: #E24B4A;
  border-color: #E24B4A;
}

.add-log-entry-btn {
  width: 100%;
  padding: 10px;
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--text2);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.add-log-entry-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ===== RESPONSIVE ===== */
@media(max-width:700px){
  :root{ --nav-width:0px; --tab-width:0px; }
  .topbar { left:0; }
  .panels { left:0; }
  .tab-sidebar { display: none; }
}

/* ===== HOVER-REVEAL DELETE BUTTONS ===== */
.tab-item-delete,
.muscle-delete-btn,
.exercise-row .action-btn.delete,
.log-exercise .log-delete-btn,
.log-entry-header .btn.delete {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease;
}

.tab-item:hover .tab-item-delete,
.tab-item.active .tab-item-delete,
.muscle-group:hover .muscle-delete-btn,
.exercise-row:hover .action-btn.delete,
.log-exercise:hover .log-delete-btn,
.log-entry:hover .log-entry-header .btn.delete {
  opacity: 1;
  pointer-events: auto;
}

/* Keyboard accessibility */
.tab-item-delete:focus-visible,
.muscle-delete-btn:focus-visible,
.exercise-row .action-btn.delete:focus-visible,
.log-exercise .log-delete-btn:focus-visible,
.log-entry-header .btn.delete:focus-visible {
  opacity: 1;
  pointer-events: auto;
}

/* Touch devices have no hover - keep them visible */
@media (hover: none) {
  .tab-item-delete,
  .muscle-delete-btn,
  .exercise-row .action-btn.delete,
  .log-exercise .log-delete-btn,
  .log-entry-header .btn.delete {
    opacity: 1;
    pointer-events: auto;
  }
}
</style>
</head>
<body>

<div id="nav-show-tab" title="Show sidebar">☰</div>

<!-- MAIN NAV -->
<nav class="nav" id="onetrack-nav">
  <div class="nav-header">
    <div class="nav-title">
      <span class="logo-check" id="logoCheck">
        <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" style="width:17px;height:17px;display:block;overflow:visible;">
          <rect class="logo-box" x="2" y="2" width="16" height="16" rx="4"/>
          <path class="logo-tick" d="M5 10 L8.5 13.5 L22 3"/>
        </svg>
      </span>
      <span id="otBrandName"></span>
    </div>
    <button id="nav-toggle-btn" class="nav-toggle-btn" title="Hide sidebar">&#8249;</button>
  </div>
  <div id="onetrack-nav-links"></div>
</nav>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">✦ Workout Planner</div>
</div>

<!-- PANELS -->
<div class="panels">
  <!-- TAB SIDEBAR -->
  <div class="tab-sidebar" id="tabSidebar"></div>

  <!-- MAIN CONTENT -->
  <div class="content-wrapper">
    <div class="main" id="mainContent"></div>
    <div class="tab-footer" id="tabFooter"></div>
  </div>
</div>

      ]},
      { muscle: 'Glutes (Power & Endurance)', exercises: [

    ],

// Load data from storage
function loadData() {
  OT.onReady(async () => {
    const saved = await OT.get('ONETRACK_WORKOUT_PLANNER');
    if (saved) {
      try {
        const loaded = JSON.parse(saved);
        Object.assign(appState, loaded);
      } catch (e) {
        console.log('Using default data');
      }
    }
    // Ensure Log Book tab always exists
    if (!appState.tabs.find(t => t.id === 'logbook')) {
      appState.tabs.push({ id: 'logbook', name: 'Log Book', order: appState.tabs.length });
    }
    renderTabSidebar();
    renderTab('lower');
  });
}

// Save data to storage
function saveData() {
  OT.set('ONETRACK_WORKOUT_PLANNER', JSON.stringify(appState));
}

// Render tab sidebar
function renderTabSidebar() {
  const sidebar = document.getElementById('tabSidebar');
  sidebar.innerHTML = '';
  
  appState.tabs.sort((a, b) => a.order - b.order);
  
  appState.tabs.forEach((tab, idx) => {
    const tabEl = document.createElement('div');
    tabEl.className = 'tab-item' + (appState.activeTab === tab.id ? ' active' : '');
    tabEl.draggable = true;
    
    tabEl.ondragstart = (e) => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('tabId', tab.id);
    };
    
    tabEl.ondragover = (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    };
    
    tabEl.ondrop = (e) => {
      e.preventDefault();
      const draggedId = e.dataTransfer.getData('tabId');
      const draggedTab = appState.tabs.find(t => t.id === draggedId);
      const currentTab = tab;
      if (draggedTab && currentTab && draggedTab.id !== currentTab.id) {
        [draggedTab.order, currentTab.order] = [currentTab.order, draggedTab.order];
        saveData();
        renderTabSidebar();
      }
    };
    
    // Drag handle
    const handle = document.createElement('span');
    handle.className = 'tab-drag-handle';
    handle.textContent = '⋮';
    tabEl.appendChild(handle);
    
    // Label - single click to switch tab
    const label = document.createElement('span');
    label.className = 'tab-item-label';
    label.textContent = tab.name;
    label.onclick = (e) => {
      e.stopPropagation();
      appState.activeTab = tab.id;
      renderTabSidebar();
      if (tab.id === 'logbook') {
        renderLogBook();
      } else {
        renderTab(tab.id);
      }
    };
    
    // Double-click to rename (but not Log Book)
    label.ondblclick = (e) => {
      e.stopPropagation();
      if (tab.id === 'logbook') return;
      const newName = prompt('Rename tab:', tab.name);
      if (newName && newName.trim()) {
        tab.name = newName.trim();
        saveData();
        renderTabSidebar();
      }
    };
    
    tabEl.appendChild(label);
    
    // Delete button (but not Log Book)
    if (tab.id !== 'logbook') {
      const delBtn = document.createElement('button');
      delBtn.className = 'tab-item-delete';
      delBtn.textContent = '✕';
      delBtn.onclick = (e) => {
        e.stopPropagation();
        if (confirm('Delete this tab?')) {
          appState.tabs = appState.tabs.filter(t => t.id !== tab.id);
          delete appState.workoutData[tab.id];
          appState.activeTab = appState.tabs[0]?.id || 'lower';
          saveData();
          renderTabSidebar();
          renderTab(appState.activeTab);
        }
      };
      tabEl.appendChild(delBtn);
    }
    
    sidebar.appendChild(tabEl);
  });
  
  const addBtn = document.createElement('button');
  addBtn.className = 'add-tab-btn';
  addBtn.textContent = '+ Add Tab';
  addBtn.onclick = addNewTab;
  sidebar.appendChild(addBtn);
}

function addNewTab() {
  const name = prompt('Tab name:');
  if (name && name.trim()) {
    const newId = 'tab_' + Date.now();
    appState.tabs.push({
      id: newId,
      name: name.trim(),
      order: appState.tabs.length - 1
    });
    appState.workoutData[newId] = [];
    saveData();
    renderTabSidebar();
  }
}

// Render tab content
function renderTab(tabId) {
  const content = document.getElementById('mainContent');
  const footer = document.getElementById('tabFooter');
  const tab = appState.tabs.find(t => t.id === tabId);
  
  if (!tab) return;
  
  let html = `<div class="page-title">${tab.name}</div><div class="main-content-grid">`;
  
  const muscles = appState.workoutData[tabId] || [];
  
  muscles.forEach((group, groupIdx) => {
    html += `<div class="muscle-group" draggable="true" ondragstart="dragMusclStart('${tabId}', ${groupIdx})" ondrop="dragMusclDrop('${tabId}', ${groupIdx})" ondragover="dragOver(event)" data-tab="${tabId}" data-group="${groupIdx}">
      <div class="muscle-header">
        <span class="muscle-drag-handle">⋮</span>
        <span class="muscle-name" ondblclick="editMuscleName('${tabId}', ${groupIdx})">${group.muscle}</span>
        <button class="muscle-delete-btn" onclick="deleteMusclGroup('${tabId}', ${groupIdx})">✕</button>
      </div>`;
    
    group.exercises.forEach((ex, exIdx) => {
      html += `<div class="exercise-row" draggable="true" ondragstart="dragStart(event, '${tabId}', ${groupIdx}, ${exIdx})" ondrop="dragDrop(event, '${tabId}', ${groupIdx}, ${exIdx})" ondragover="dragOver(event)">
        <div class="drag-handle">⋮</div>
        <div class="exercise-name" ondblclick="editExerciseName('${tabId}', ${groupIdx}, ${exIdx})">${ex.name}</div>
        <input type="number" class="editable-input" value="${ex.count}" min="1" onchange="updateField('${tabId}', ${groupIdx}, ${exIdx}, 'count', this.value); saveData();" placeholder="count">
        <input type="number" class="editable-input" value="${ex.reps}" min="1" onchange="updateField('${tabId}', ${groupIdx}, ${exIdx}, 'reps', this.value); saveData();" placeholder="reps">
        <input type="date" class="date-input" value="${ex.date}" onchange="updateField('${tabId}', ${groupIdx}, ${exIdx}, 'date', this.value); saveData();">
        <div class="checkbox-wrapper"><input type="checkbox" ${ex.checked ? 'checked' : ''} onchange="updateField('${tabId}', ${groupIdx}, ${exIdx}, 'checked', this.checked); saveData();"></div>
        <button class="action-btn delete" onclick="deleteExercise('${tabId}', ${groupIdx}, ${exIdx})">✕</button>
      </div>`;
    });
    
    html += `<button class="add-exercise-btn" onclick="addExercise('${tabId}', ${groupIdx})">+ Add Exercise</button>
    </div>`;
  });
  
  html += `</div><button class="add-muscle-btn" onclick="addMusclGroup('${tabId}')">+ Add Muscle Group</button>`;
  
  content.innerHTML = html;
  
  // Footer
  footer.innerHTML = `<button class="btn btn-accent" onclick="logWorkout('${tabId}')">📋 Log Workout</button>`;
}

// Render Log Book
function renderLogBook() {
  const content = document.getElementById('mainContent');
  const footer = document.getElementById('tabFooter');
  
  let html = `<div class="page-title">Log Book</div>
              <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;">
                <button class="btn" onclick="printLogBook()">🖨 Print</button>
                <button class="btn" onclick="exportToExcel()">📊 Export Excel</button>
                <button class="btn btn-accent" onclick="addManualLogEntry()">+ Add Entry</button>
              </div>`;
  
  if (appState.logBook.length === 0) {
    html += '<p style="color:var(--text2);">No log entries yet</p>';
  } else {
    appState.logBook.forEach((entry, idx) => {
      html += `<div class="log-entry">
        <div class="log-entry-header">
          <span class="log-date">${entry.date}</span>
          <div class="log-actions">
            <button class="btn" onclick="exportDayToCalendar(${idx})">📅 Calendar</button>
            <button class="btn delete" onclick="deleteLogEntry(${idx})">✕</button>
          </div>
        </div>`;
      
      entry.exercises.forEach((ex, exIdx) => {
        html += `<div class="log-exercise">
          <input type="text" class="log-exercise-name log-input" value="${ex.name}" onchange="appState.logBook[${idx}].exercises[${exIdx}].name = this.value; saveData();">
          <input type="number" class="log-input" value="${ex.count}" onchange="appState.logBook[${idx}].exercises[${exIdx}].count = this.value; saveData();">
          <input type="number" class="log-input" value="${ex.reps}" onchange="appState.logBook[${idx}].exercises[${exIdx}].reps = this.value; saveData();">
          <button class="log-delete-btn" onclick="appState.logBook[${idx}].exercises.splice(${exIdx}, 1); saveData(); renderLogBook();">✕</button>
        </div>`;
      });
      
      html += `<button class="add-exercise-btn" onclick="addLogExercise(${idx})">+ Add</button></div>`;
    });
  }
  
  content.innerHTML = html;
  footer.innerHTML = '';
}

// Log workout
function logWorkout(tabId) {
  const muscles = appState.workoutData[tabId] || [];
  const checked = [];
  const today = new Date().toISOString().split('T')[0];
  
  muscles.forEach(group => {
    group.exercises.forEach(ex => {
      if (ex.checked) {
        checked.push({ name: ex.name, count: ex.count, reps: ex.reps });
      }
    });
  });
  
  if (checked.length === 0) {
    alert('No exercises checked');
    return;
  }
  
  const existingIdx = appState.logBook.findIndex(e => e.date === today);
  if (existingIdx >= 0) {
    appState.logBook[existingIdx].exercises.push(...checked);
  } else {
    appState.logBook.push({ date: today, exercises: checked });
  }
  
  // Uncheck all
  muscles.forEach(group => {
    group.exercises.forEach(ex => ex.checked = false);
  });
  
  saveData();
  alert('Logged to Log Book');
  renderTab(tabId);
}

// Muscle group operations
function addMusclGroup(tabId) {
  const name = prompt('Muscle group name:');
  if (name && name.trim()) {
    appState.workoutData[tabId].push({
      muscle: name.trim(),
      exercises: []
    });
    saveData();
    renderTab(tabId);
  }
}

function editMuscleName(tabId, groupIdx) {
  const newName = prompt('Rename:', appState.workoutData[tabId][groupIdx].muscle);
  if (newName && newName.trim()) {
    appState.workoutData[tabId][groupIdx].muscle = newName.trim();
    saveData();
    renderTab(tabId);
  }
}

function deleteMusclGroup(tabId, groupIdx) {
  if (confirm('Delete muscle group?')) {
    appState.workoutData[tabId].splice(groupIdx, 1);
    saveData();
    renderTab(tabId);
  }
}

function dragMusclStart(tabId, groupIdx) {
  window.draggedMuscle = { tabId, groupIdx };
}

function dragMusclDrop(tabId, groupIdx) {
  if (!window.draggedMuscle) return;
  const from = window.draggedMuscle;
  if (from.tabId === tabId && from.groupIdx !== groupIdx) {
    const muscles = appState.workoutData[tabId];
    [muscles[from.groupIdx], muscles[groupIdx]] = [muscles[groupIdx], muscles[from.groupIdx]];
    saveData();
    renderTab(tabId);
  }
}

// Exercise operations
function addExercise(tabId, groupIdx) {
  appState.workoutData[tabId][groupIdx].exercises.push({
    name: 'New Exercise',
    count: 10,
    reps: 2,
    date: '',
    checked: false
  });
  saveData();
  renderTab(tabId);
}

function editExerciseName(tabId, groupIdx, exIdx) {
  const newName = prompt('Rename:', appState.workoutData[tabId][groupIdx].exercises[exIdx].name);
  if (newName && newName.trim()) {
    appState.workoutData[tabId][groupIdx].exercises[exIdx].name = newName.trim();
    saveData();
    renderTab(tabId);
  }
}

function updateField(tabId, groupIdx, exIdx, field, value) {
  if (field === 'checked') {
    appState.workoutData[tabId][groupIdx].exercises[exIdx][field] = value;
  } else {
    appState.workoutData[tabId][groupIdx].exercises[exIdx][field] = value;
  }
}

function deleteExercise(tabId, groupIdx, exIdx) {
  if (confirm('Delete exercise?')) {
    appState.workoutData[tabId][groupIdx].exercises.splice(exIdx, 1);
    saveData();
    renderTab(tabId);
  }
}

function dragStart(e, tabId, groupIdx, exIdx) {
  window.draggedEx = { tabId, groupIdx, exIdx };
  e.dataTransfer.effectAllowed = 'move';
}

function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function dragDrop(e, tabId, groupIdx, exIdx) {
  e.preventDefault();
  if (!window.draggedEx) return;
  const from = window.draggedEx;
  if (from.tabId === tabId && from.groupIdx === groupIdx && from.exIdx !== exIdx) {
    const exercises = appState.workoutData[tabId][groupIdx].exercises;
    [exercises[from.exIdx], exercises[exIdx]] = [exercises[exIdx], exercises[from.exIdx]];
    saveData();
    renderTab(tabId);
  }
}

// Log book operations
function addManualLogEntry() {
  const date = prompt('Date (YYYY-MM-DD):', new Date().toISOString().split('T')[0]);
  if (date) {
    appState.logBook.push({ date, exercises: [] });
    saveData();
    renderLogBook();
  }
}

function addLogExercise(entryIdx) {
  appState.logBook[entryIdx].exercises.push({ name: 'Exercise', count: 10, reps: 2 });
  saveData();
  renderLogBook();
}

function deleteLogEntry(idx) {
  if (confirm('Delete entry?')) {
    appState.logBook.splice(idx, 1);
    saveData();
    renderLogBook();
  }
}

function exportDayToCalendar(entryIdx) {
  const entry = appState.logBook[entryIdx];
  const desc = entry.exercises.map(e => `${e.name} (${e.count}x${e.reps})`).join('\\n');
  const calUrl = `https://calendar.google.com/calendar/u/0/r/eventedit?text=Workout&dates=${entry.date.replace(/-/g, '')}/${entry.date.replace(/-/g, '')}&details=${encodeURIComponent(desc)}`;
  window.open(calUrl, '_blank');
}

function printLogBook() {
  const printWin = window.open('', '_blank');
  let html = '<h1>Workout Log Book</h1><table border="1" cellpadding="8">';
  html += '<tr><th>Date</th><th>Exercise</th><th>Count</th><th>Reps</th></tr>';
  appState.logBook.forEach(entry => {
    entry.exercises.forEach((ex, idx) => {
      html += `<tr><td>${idx === 0 ? entry.date : ''}</td><td>${ex.name}</td><td>${ex.count}</td><td>${ex.reps}</td></tr>`;
    });
  });
  html += '</table>';
  printWin.document.write(html);
  printWin.document.close();
  printWin.print();
}

function exportToExcel() {
  const data = [['Date', 'Exercise', 'Count', 'Reps']];
  appState.logBook.forEach(entry => {
    entry.exercises.forEach(ex => {
      data.push([entry.date, ex.name, ex.count, ex.reps]);
    });
  });
  
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Log Book');
  XLSX.writeFile(wb, 'WorkoutLog.xlsx');
}

// Init
loadData();
